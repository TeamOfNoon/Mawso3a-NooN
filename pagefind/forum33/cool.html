
<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="utf-8">
<title>Pagefind Search</title>

<style>

body{
    font-family:tahoma;
    max-width:900px;
    margin:20px auto;
}

#q{
    width:300px;
    padding:8px;
}

button{
    padding:8px 15px;
}

.result{
    border:1px solid #ccc;
    margin:10px 0;
    padding:10px;
}

.loading{
    color:red;
}

</style>
</head>
<body>

<h2>بحث</h2>

<input
    id="q"
    placeholder="اكتب كلمة البحث">

<button onclick="doSearch()">
بحث
</button>

<div id="status"></div>

<div id="results"></div>

<div>

<button onclick="prevPage()">
السابق
</button>

<span id="pageinfo"></span>

<button onclick="nextPage()">
التالي
</button>

</div>

<script type="module">

let pf = null;

let results = [];

let cache = {};

let currentPage = 1;

let pageSize = 20;

async function getPF(){

    if(pf){
        return pf;
    }

    pf =
        await import(
            "./pagefind/pagefind.js"
        );

    return pf;
}

async function getResult(i){

    if(cache[i]){
        return cache[i];
    }

    cache[i] =
        await results[i].data();

    return cache[i];
}

async function preload(page){

    let start =
        (page - 1)
        * pageSize;

    let end =
        Math.min(
            start + pageSize,
            results.length
        );

    for(
        let i=start;
        i<end;
        i++
    ){

        if(!cache[i]){

            cache[i] =
                await results[i]
                .data();
        }
    }
}

window.doSearch =
async function(){

    let q =
        document
        .getElementById("q")
        .value
        .trim();

    if(!q){
        return;
    }

    document
        .getElementById("status")
        .innerHTML =
        "جار البحث...";

    cache = {};

    currentPage = 1;

    let pagefind =
        await getPF();

    let search =
        await pagefind.search(q);

    results =
        search.results;

    if(
        results.length === 0
    ){

        document
            .getElementById("results")
            .innerHTML =
            "لا توجد نتائج";

        return;
    }

    await preload(1);

    renderPage();
};

async function renderPage(){

    window.scrollTo(
        0,
        0
    );

    let start =
        (currentPage - 1)
        * pageSize;

    let end =
        Math.min(
            start + pageSize,
            results.length
        );

    let html = "";

    for(
        let i=start;
        i<end;
        i++
    ){

        let data =
            await getResult(i);

        html +=

            "<div class='result'>" +

            "<h3>" +

            (data.meta.title ||
            "بدون عنوان")

            +

            "</h3>" +

            "<div>" +

            data.excerpt +

            "</div>" +

            "<div>" +

            "<a href='" +

            data.url +

            "'>" +

            data.url +

            "</a>" +

            "</div>" +

            "</div>";
    }

    document
        .getElementById("results")
        .innerHTML =
        html;

    let totalPages =
        Math.ceil(
            results.length /
            pageSize
        );

    document
        .getElementById("status")
        .innerHTML =

        "عدد النتائج: "

        +

        results.length;

    document
        .getElementById("pageinfo")
        .innerHTML =

        currentPage +

        " / " +

        totalPages;

    preload(
        currentPage + 1
    );
}

window.nextPage =
async function(){

    let totalPages =
        Math.ceil(
            results.length /
            pageSize
        );

    if(
        currentPage >=
        totalPages
    ){
        return;
    }

    currentPage++;

    renderPage();
};

window.prevPage =
async function(){

    if(
        currentPage <= 1
    ){
        return;
    }

    currentPage--;

    renderPage();
};

document
.getElementById("q")
.addEventListener(
    "keydown",
    function(e){

        if(
            e.key === "Enter"
        ){
            doSearch();
        }
    }
);

</script>

</body>
</html>
```
