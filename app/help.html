<script>
   function getParameterByName(name) {
    var url = window.location.href;
    var regex = new RegExp("[\?\&\#](" + name + "_(\\d+))");
    var results = regex.exec(url);

    if (!results) {
        return null;
    }

    if (!results[1]) {
        return '';
    }

    return decodeURIComponent(results[1]);
}

});
