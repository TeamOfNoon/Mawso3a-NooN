			  <blockquote class="postcontent restore"><span><font size="5"><div style="text-align: center;"><font size="5"><font color="#cc0000">- 2 -</font><font color="#1c1919"><br />
<br />
</font><font color="#800080">إن ما يحصل في دارفور السودان لمهزلة وجريمة إنسانيّة قذرة، فمتى يتحرك المسلمون لإنهائها ؟</font></font><font color="#1c1919"><font size="5"><br />
</font><br />
<div class="notepaper">
  <figure class="quote">
    <blockquote class="curly-quotes">
<div class="name_of_quote_first">اقتباس المشاركة  :  
					</div>
				عبد ربه 09-12-2007, 08:48 pm<br />
بسم الله الرحمن الرحيم ولا عدوان إلا على الظالمين ، وصل الله على المبعوث رحمة للعالمين وآله الطاهرين والصحب المختارين ،<br />
من لم يهمه أمر المسلمين فليس منهم ولو ادَّعى جاهدا أنه أو أنها منهم ، فما هذا الذي يحصل في منطقة دارفور السودان منذ ما يزيد عن الثلاثة سنوات ولا أحد من المسلمين يحرك ساكنا ؟ <br />
قال صلى الله عليه وسلم :" انصر أخاك ظالما أو مظلوما " فقالوا :" يارسول الله قد علمنا نصرته وهو مظلوم ، ولكن كيف ننصره وهو ظالم ؟" فقال صلى الله عليه وسلم :"أن تأخذ على يديه حتى يواصل الظلم " أو كما قال صل الله عليه وسلم .<br />
<br />
لقد كنا نظن في بداية الامر أن أحداث التشريد والقتل والنزوح في منطقة دارفور السودان إنما قضيت مفتعلة من طرف أعداء الإسلام ليشوهوا صورة الإسلام والدين ولكي يبرروا تدخلهم وسيطرتهم على أرض مسلمة تطل على الوطن العربي جنوبا وعلى القارة الإفريقية شمالا والمحيط الهندي ...<br />
<br />
إلا أن صور المشردين السودانين رجالا ونساءا وأطفالا وشيوخا كون العملية مؤامرة أو اتهام باطل بل صار الأمر مشاهدة بالعيان . والغريب في الأمر أن الضحايا واحدة اسمها فاطمة والأخرى حليمة ، والشيوخ هذا اسمه أبو بكر والطفل المشرد الذي قتلوا أباه اسمه محمد وأ خوه اسمه علي ... فما هذا الذي يحصل في الأمة ؟<br />
<br />
تبين لنا أن مرتكبي الجريمة هو قبائل النجاويد ، قبائل سودانية من انحدار عربي ؟ يقتلون ويذبون ويشردون مسلمي المنطقة على أساس أن من هو من النجواويد أشرف من بقية القبائل كون انحداره من الجزيزة العربية والآخرون أصلهم إفريقي لا قيمة لهم ولو كانوا يشهدون أن لا إله إلا الله وأن محمدا رسول الله <br />
<br />
لقد وصلتنا صور مخيمات اللاجئين نساء وشيوخ وأطفال يتامى لأن الآباء قتلوا من طرف النجاويد اما عن تواصل الاغتصاب فحدث ولا حرج ، فبالله من أين لكم أن تكونوا مسلمين يا قبائل النجاويد المعتدين السفاحين ، وتدعون أنكم من المسلمين والإسلام بريء من أفعالكم القبيحة تلك <br />
<br />
والمسلمين مكتوفي الأيادي يتفرجون والأعراض تنتهك والأطفال تشرد ، فما هذا ؟ ألهذا الحد وصل بكم الوهن يا أمة الإسلام والعروبة ، ثم تقولون كيف يأتي الأمريكان والنصارى لأراضينا وتظنون أن الله سينصركم عليهم ؟ فما لكم تحكمون ؟ أما علمتم أن الله تعالى ينصر الثلة الكافرة على الطائفة المسلمة التي لم تعدل بين أفرادها ؟ <br />
أو تحسبون أن الله سينصركم وأنتم تقتلون في النساء المسلمات وتستحيون الأعراض وتيتموا الصبيان ؟ <br />
<br />
يا رب إليك المشتكى ، وأنت وكيلي يا ويكيل عليهم وحسبي إذا كان القوي موكلا <br />
<br />
اللهم بدد شمل الشاطين المندسين تحت اسم الإسلام والدين الذين شردوا وقتلوا مستضعفي المؤمنين ، اللهم عليك بهم فإنهم أكثروا في الأرض الفساد بغير الحق ، اللهم ارحم دموع شيوخ وأطفال وأرامل المسلمين حتى ولو كانوا سودانيين ولم يكونوا من انحدار عربي من قبائل النجاويد ، اللهم عليك بالظالمين بدد شملهم وفرق جمعهم ورد كيدهم في أنحارهم عن ضعفاء المسلمين ، وابعث في المسلمين قادة حازمين جادين عادلين كي يتصدوا للظالمين ويوقوفوهم عند حدهم إنك سميع قريب مجيب .<br />
<br />
وسلامٌ على المرسلين ,والحمد لله رب العالمين..
