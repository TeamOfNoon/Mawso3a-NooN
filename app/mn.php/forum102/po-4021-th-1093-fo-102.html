<div class="notepaper">

<div class="name_of_quote_first">اقتباس المشاركة  :  
					</div>
				الشهيد09-30-2008, 03:53 AM<br />
بسم الله الرحمن الرحيم والصلاة والسلام على اشرف المرسلين والحمد لله رب العالمين ولا عدوان الا على الظالمين والعاقبة للمتقين يقول الله تعالىك((وقاتلوا المشركين كافة كما يقاتلونكم كافة واعلموا أن الله مع المتقين ) ) صدق الله العظيم ؛ في هده الاية يامرنا الله عز وجل ان تقاتل المشركين كافة اي نقاتلوهم ونحن جماعة واحدة تحت راية واحدة ولغاية واحدة وهي اقامة شرع الله عز وجل في ارضه )) وقاتلوهم حتى لا تكون فتنة )) لان المشركين ادا تركناهم يفعلون مايريدون تكن فتنة في الارض كما نرى الان لاحولة ولا قوة الا بالله فتنو العالم بافكارهم الشيطانية وحللو الحرام وحرمو الحلال واسفكو الدماء بغير الحق ونهبو ثروات الامة الاسلامية امام اعين اولياء الامور ولاكن اهل الحق لا يخلى منهم زمان ولا مكان كما قال رسول الله صلا الله عليه وسلم((لا تزال طائفة من أمتي ظاهرين على الحق لا يضرهم من خذلهم حتى يأتي أمر الله وهم كذلك‏)) وهم ضاهرون ومؤيدون من الله عز وجل بالنصر والتمكين وهم يقاتلون اولياء الشيطان بكل ماعندهم من جهد وطاقة ومال وعلم يهاجرون ويضحون ويستشهدون الله اكبر والله يدكروننا باصحاب رسول الله صلا الله عليه وسلم اشداء على الكفار رحماء بينهم وكما نعلم ان العالم باسره يحاربهم بجميع الوسائل الممكنة الحربية والاعلامية والاقتصادية والحصار والكر والفر ولاكن يابى الله الا ان يتم نوره ولو كره الكافرون وقد اعلن فرعون العصر بوش الاصغر طاغوت امريكا عندما اقتحمت الكتيبة المجاهدة واشنطن بطائرات امريكية وضربت هبل العصر واداقوهم ما اداقونا من العداب والصغار واهاجمو حتى البانطجون وهي تسمى عندنا ايه المسلمون المومنين بغزوة واشنطن التي نفدها التسعة عشر رحمة الله عليهم ونحسبهم من الشهداء مند دالك الحين اعلنت امريكا الحرب على الاسلام والمسلمين كافة واعلنو حرب صليبية جديدة كما نطقها الشيطان بوش مع العلم ان جميع الدول الاوربية تشترك معهم في هدا الحصار العنيف للمسلمين ادن هم يقاتلوننا كافة ؟ لاكن ولله الحمد حتى المجاهدين الان يقاتلونهم كافة تحت راية واحدة وهي راية رسول الله لا اله الا الله محمد رسول الله وتسمى هاده الكتائب بتنضيم القاعدة اختارهم الله من بين مليار ونصف مسلم لحمل هده الامانة التي حملها من كان قبلهم من المومنين الصادقين الاخيار وهم ماضين في جهادهم حتى يمكن الله لهم في الارض ويجعلهم هم الوارثين وكما نعرف الان ان حركت طالبان في بلاد خرسان((افغانستان)) هي ايضا تحت راية تنضيم القاعدة والدولة الاسلامية في العراق وبعد الكتائب في سورية والمحاكم الاسلامية في الصومال والمجاهدين في السودان وتنضيم القاعدة في المغرب الاسلامي وخصوصا في الجزائر وكتر من المجموعات السرية في امريكا واوروبا واسايا و افريقية والشرق الاوسط ))قَاتِلُوا الَّذِينَ لا يُؤْمِنُونَ بِاللَّهِ وَلا بِالْيَوْمِ الآخِرِ وَلا يُحَرِّمُونَ مَا حَرَّمَ اللَّهُ وَرَسُولُهُ وَلا يَدِينُونَ دِينَ الْحَقِّ مِنَ الَّذِينَ أُوتُوا الْكِتَابَ حَتَّى يُعْطُوا الْجِزْيَةَ عَنْ يَدٍ وَهُمْ صَاغِرُونَ<br />
<br />
(( فهدا امر الله عز وجل ان نقاتلهم حتى يعطو الجزية وهم صاغرون لامر الله والا سينقلبون علينا ونحن صاغرون كما حصل قال رسول الله صلا الله عليه وسلم))ماتركت امة الجهاد الا صلط الله عليها الذل )) واي دل اكتر من هدا الدي نعيشه الان في بلاد الاسلام صدقت يارسول الله سلط الله علينا الدل بتركنا الجهاد واعلاء كلمت الله اما بعد يااخي ناصر محمد قال رسول الله صلا الله عليه واله وسلم ((ومن لم يهتم بأمور المسلمين فليس بمسلم)) تقريبا قرات كل المواضيع المكتوبة هنا فلم اجدك تتكلم عن حال الامة في محنتها هاده ولم تتكلم عن المجاهدين في الثغور وعن احوال الرعية والمقدسات المحتلة متل بيت المقس واريدك الان ياناصر اليماني ادا كنت قائد هده الامة فافتنني وافتي اخوتك في هدا الموقع وافتي المسلمين في المجاهدين )) تنضيم القاعدة)) طالبان)) الدلوة الاسلامية بالعراق)) وتنضيم القاعدة بالمغرب الاسلامي)) وافتنا في اسامة بنلادن.. وايمن الظواهري) والملا محمد عمر امير طالبان)) وابو عمر البغدادي امير الدلولة الاسلامية في العراق وهم كما نعلم تحت راية واحد ولله الحمد يطبقون قول الله تعالى وقاتلوا المشركين كافة كما يقاتلونكم كافة ) ولا تتسرع بالرد اخي ناصر قبل ان تفكر جيدا بعقلك وترا مادا يقول قلبك واستخر الله تعالى على ان يريك الحق قبل ان ترض علينا وهدا الامر ليس بهين كما تعلم ولدينا مشروع رباني ان شاء الله عند سماع جوابك على هده الاسئلة وعيد مبارك سعيد وكل عام والامة الاسلامية بخير .
</blockquote>
    <figcaption class="quote-by">— 
<span class="name_of_quote">انتهى الاقتباس</span>

<div class="notepaper">
  <figure class="quote">
    <blockquote class="curly-quotes">
<div class="name_of_quote_first">اقتباس المشاركة  :  
					</div>
				عبد ربه09-30-2008, 11:36 PM<br />
بسم الله الرحمن الرحيم<br />
الحمد لله وكفى وسلام على عباده الذين أصطفى من أولهم إلى ختام مسكهم إمام المجاهدين ورحمة الله المهداة للعالمين وعلى آله الطيبين والصحب المختارين وعلى كل من أهتدى بهديهم إلى يوم الدين<br />
الحمد لله الذي أكمل لنا الدين وأتم علينا نعمته وأرتضى لنا الإسلام دينا فقال في محكم كتابه :<br />
(((وَقَاتِلُواْ فِي سَبِيلِ اللّهِ الَّذِينَ يُقَاتِلُونَكُمْ وَلاَ تَعْتَدُواْ إِنَّ اللّهَ لاَ يُحِبِّ الْمُعْتَدِينَ* وَاقْتُلُوهُمْ حَيْثُ ثَقِفْتُمُوهُمْ وَأَخْرِجُوهُم مِّنْ حَيْثُ أَخْرَجُوكُمْ وَالْفِتْنَةُ أَشَدُّ مِنَ الْقَتْلِ وَلاَ تُقَاتِلُوهُمْ عِندَ الْمَسْجِدِ الْحَرَامِ حَتَّى يُقَاتِلُوكُمْ فِيهِ فَإِن قَاتَلُوكُمْ فَاقْتُلُوهُمْ كَذَلِكَ جَزَاء الْكَافِرِينَ))) صدق الله العظيم <br />
<br />
فأركان الدين واضحة جلية ولله الحمد وركن الجهاد له قواعده وأشراطه وأصوله علمها من علمها وليس الجهاد والغزو في سبيل أمر همجي يقرره الأفراد حسب ما تملي عليهم نفوسهم وتوجهاتهم بل ركن الجهاد له ضوابط ذكرت في كتاب الله القرآن العظيم ونصت عليها السنة المطهرة الحق على صاحبها أفضل الصلاة والسلام <br />
وبقدر ما أتفق مع الأخ الشهيد على ما تفضل بتحريره في أول مشاركته بقدر ما أعترض عليه في ماقاله في الجزء الأخير مما نقل لنا - ومداخلتي ليست بفتوى بقدر ما هي تقديم الدليل العقلي والعلمي على إثر نتائج التحقيق في عملية أحداث 11 سبتمبر أو ما يعرف بتفجيرات المركز العالمي للتجارة بنيو يورك والتفجير الذي حصل بمبنى البنتجون ((مبنى وزارة الدفاع والحربية الأمريكي )) <br />
في مداخلتي سأعرض على حضاراتكم ملفات بالصورة والكلام تؤكد خطأ تسمية أحداث 9/11 بغزوة كما يدعيه الأخ الشهيد ، وليس بمجرد الإعتراض كلاميا بل كما ذكرت لكم بالدليل الملموس وتحكيم العقل والفكر بعيدا عن العاطفة والتسرع الأعمى بالحكم على الأحداث والإنسياق وراء خطة هي في الحقيقة ضد الإسلام والمسلمين ...<br />
فالأخ الشهيد يقول بالحرف الواحد :<br />
عندما اقتحمت الكتيبة المجاهدة واشنطن بطائرات امريكية وضربت هبل العصر واداقوهم ما اداقونا من العداب والصغار واهاجمو حتى البانطجون وهي تسمى عندنا ايه المسلمون المومنين بغزوة واشنطن التي نفدها التسعة عشر رحمة الله عليهم ونحسبهم من الشهداء <br />
فأقول مستعينا بالله ، هذا ما أراد أعداء الدين والإسلام ترسيخه في الذهون وهو المعتقد أن المسلمون هم أناس همجيون إرهابيون يقومون بأعمال إرهابية وقتل الأنفس البريئة وتسبيب الفساد في الأرض بغير الحق ..<br />
والمقصود بأعداء الحق والدين هم : مجموعة اليهود الصهاينة عبدة الشيطان الرجيم الذين يخططون بمكر خبيث تبعا لترتيب شيطاني وتنسيق يهدف لتحطيم البشرية جمعاء وضرب الشعوب ببعضها البعض ، وهذه المجوعة هم قادة الحكومة الشبح والذين يقررون السياسة الأمريكية في الخفاء ويفرضونه على البيت الأبيض وعلى حكومات العالم تحت ضغوطات مالية وفضائح لا أخلاقية وتهديدات بمختلف الأساليب حيث أنهم يتحكمون في البنك العالمي والتجارة العالمية والثروات المالية على مستوى عالمي ، وأسمهم <br />
"The Shadow Government "<br />
<br />
وقصد معرفة سر هذه المجموعة لا بد من البحث المعمق والمطول تاريخيا وسياسيا ومجرى الأحداث على المدى البعيد والقصير كي يتمكن الباحث من العثور على الأدلة المادية التي تخوله فهم حقيقة ما يجري وراء الكواليس والأحداث - ولا مجال في مداخلتي هذه لذكر كل التفاصيل- <br />
إن هذه المجموعة اليهودية الخبيثة تعمل على تحقيق الإمبراطورية اليهودية الصهيونية عاصمتها " هيكل سليمان " عليه السلام وإعادة بنائه بعد تفجير المسجد الأقصى بالقدس المحتل (( والذي ينوون القيام به أي التفجير للمسجد الأقصى في غضون الشهور القادمة )) وقد أعدوا اللاوازم الضرورية من مواد تفجير ...<br />
وفي المقابل فإنهم قاموا بإعادة تصنيع كافة آليات المعبد وهي تعد بما يزيد عن سبعون تحفة كالتي كانت توجد بمعبدهم بضع مئات السنين قبيل إتلافها وحرقها على إثر هجوم الفرس وتحطيم المعبد ومن ضمن ما أعدوا تاج الملك أو ما يسمونه رئيس الرهبان اليهودي الذي سيظهر لهم آخر الزمان ليجلس على عرش الحكم ليحكم العالم بأسره واليهود وزارئه وبقية البشر عبيد لهم - ويعتقدون أن الأجل قد حان بعد هذا الإنتظار الطويل الذي دام بضع آلاف السنين ، إذن تاج المسيح المنتظر لديهم جاهز وقد عرضوه على العالم وهو يزن 666 جرام ذهب خالص وعليه نقوشات ورموز أستغرقت أكثر من سنة للحصول عليها على التاج ...<br />
ولم يبقى مفقود لديهم سوى تابوت السكينة ليتم إيجاد كافة تجهيزات المعبد ولذلك تراهم يقومون بحفريات تحت المسجد الأقصى بحثا عن الغرفة السرية التي يعتقدون أن سليمان عليه السلام بناها ليضع فيها تابوت السكينة ...<br />
وبعد هذا العرض المختصر لحقيقة المخطط فإن اليهود الصياهينة بعد تمكنهم من السيطرة بمكر خبيث على جميع المؤسسات الدينية في العالم والتسرب داخل القيادات الدينية العالمية خصوصا الديانة المسيحية مثل الكاثولوكية والتحكم وإملاء الشروط على البابا في الفاتيكان ... كما أنهم يسيطرون على الديانة البوذية في الهند والصين ... إذن بقي لهم مانع واحد ألا وهو دين الإسلام الحنيف الذي بالرغم من محاوالاتهم المتكررة بخبث لم يتمكنوا من السيطرة الكلية عليه وعلى الشعوب الإسلامية كليا إلا على البعض... وبما أنهم يعتقدون أن موعد ظهور مسيحهم المتظر المزعوم صار وشيكا جدا ... إذا لا بد لهم من إيجاد حل قصد تحطيم أكبر مانع لهم لتحقيق مبتغاهم ألا وهو دين الإسلام والمسلمين ...<br />
وبما أنهم قد تسربوا وتسللوا في المجتمعات الغربية بمكرهم اليهودي الخبيث حتى صاروا يتحكمون فيها ويسيرونها تبعا لمخطتهم الجهنمي وخصوصا سيطرتهم على أكبر قوة عالمية وأقوى آلة حربية على وجه الأرض وهي أميركا وجيشها ... كان لا بد من خلق مناخ وحدث خطير جدا كي يتمكن رئيس البيت الأبيض بوش الأصغر الذي هو عبارة عن دمية تحركها الإرادة اليهودية الصهيونية من وراء الستار ، كي يبرر للشعب الأمريكي ولشعوب العالم عملية تحريك الجيش الأميركي لتتبع الإرهابيون والمعتدون عدوانا على ممتلكات الشعوب الحرة ... فكانت أحداث 9/11 وتفجيرات المركز العالمي للتجارة والهجوم على البانطاجون هي الحل والجواب ...<br />
وفعلا ومباشرة إثر أحداث التفجيرات أستطاع بوش الأصغر من الحصول على موافقة الكنجرس الأميركي والشعب الأميركي تقريبا بنسبة 98% دعموا ونادوا بضرورة آستعمال كل ما في وسعهم قصد تتبع المجرمين ومن يسمونهم بالإرهابيون الإسلاميون ومجموعة القاعدة التي كانت تتخذ لها مقرا ببلاد أفغنستان وعلى إثر تجاوب الكنجرس ومجلس الشيوخ الأمريكي وأغلبية الشعب الأمريكي لم تتردد قوى التحالف في الإلتحاق والتصويت لدعم قرار البيت الأبيض لغزو العالم الإسلامي ... وطبعا ما كان لهم تعبئة الرأي العام للقوى العالمية والشعوب الغربية لولا أحداث 9/11 وما يسميه الأخ الشهيد بغزوة واشنطن ؟؟<br />
والآن بينما آنطلقت قوات الجيش الأميركي وقوىى التحالف في ما سموه بعملية الثأر لجريمة 9/11 وتتبع الإرهابيين ، بدأت شيئا فشيئا أصوات داخل أمريكا وبريطانيا تنادي بضرورة إقامة تحقيق وبحث مدقق لعلمية التفجيرات فتكونت عدة هيئات منها الحكومية ومنها المدنية الخاصة المحايدة لتقصي حقيقة من وراء أحداث 9/11 <br />
وسرعان ما بدأت عدة أسئلة تطرح على العقول السليمة منها :<br />
- إذا كان الإرهابيون أو ما يسمونه تنظيم القاعدة والتسعة عشر من العرب المسلمين هم بحق من وراء العملية وبما أن مركز قيادة تنظيم القاعدة يوجد بأفغنستان ، فلمذا وقع غزو العراق عوضا عن التركيز على تتبع تنظيم القاعدة بأفغنستان ؟<br />
- لدى التحقق من ضحايا تفجيرات الموكز العالمي للتجارة والبانطاجون تبين أن ليس من ضمنهم ولو ضحية واحدة من اليهود بالرغم أن عشرات من اليهود كانوا يشتغلون في مختلف الإدارات الموجودة في العمارتان لمبنى المركز التجاري العالمي ولكن الغريب في الأمر أنه لم يحضر يهودي أو يهودية واحدة لمباشرة عمله في ذلك اليوم وكأن اليهود تلقوا تحذير مسبقا للكارثة قبل حدوثها حتى لا يتواجودن في المكان في ذلك اليوم ، بل ضمن الضحايا كان يوجد عددا لا بأس به من المسلمين من الذين لقوا حتفهم من جراء الإنفجارات <br />
ومع مرور الأيام تبين أن هيئة التحقيق الحكومية كانت متخاذلة في القيام بعملية التحري وتقصي حقيقة ما حصل مما أثار الشكوك حول تورط الإدارة الأميركية في الأحداث الإرهابية فثارت ثائرة عائلات الضحايا وأصبحوا يقومون بحملات تحسيسية ومظاهرات قوبلت بالردع بالرغم أنهم كانوا يطالبون بأمور معقولة كأجوبة صريحة دون مماطلة عن عدة أسلئة وأدلة بخصوص ملابسات وجوانب بقيت تنتظر الجواب .. وبدون مواصلة إطالة في ذكر تسلل الأحداث على مرور السنوات المنقضية منذ الأحداث تمر للكلام عما صارت عليه الأمور اليوم <br />
فبعد ما يقارب ستة سنوات مند أحداث 9/11 نجد اليوم عدة جمعيات وهيئات تنادي بإلإطاحة بإدارة البيض الأبيض الأمريكي بواشطن وعلى رأسها بوش الأصغر وأعوان حكومته والمناداة بمحاكمتهم من طرف المحكمة العليا للبلاد ... حيث فقد أكثر من نصف الشعب الأمريكي الثقة في الحكومة وفي بوش الأصغر وأعون حكومته - وحركة تقصي حقائق أحداث 9/11 صارت تستقطب ملايين البشر من أنحاء العالم سواءا داخل الولايات الأمريكية أو من خارجها كبريطانيا وأروبا وأستراليا وصاروا يطالبون بإعادة قواة الجيش وإنهاء العدوان ، وبقدر ما أصبحت أصابع الإتهام والحقد والكراهية توجه ضد المجرم الحقيقي ألا وهم اليهود الصهاينة وحكومة إسرائيل بقدر ما تتعالى الأصوات بخروج قوات الإحتلال الأمركية والتحالف من العراق تسريح رهائن الحرب بجنطاناموا بي ووقف الحرب على الدول الإسلامية - وهذه القوى العارضة والمطالبة بمحامكة بوش الأصغر تتزايد يوم بعد يوم مما دعى الحكومة الشبح لآتخاذ أجراءات مثل الإنهيار المالي الذي حدث مؤخرا في الولايات الأمركية المتحدة لإركاع الشعب الأمريكي المعارض الذي صار يشكل خطر على مواصلة المخطط الصهيوني اليهودي القذر ... وبإذن الله تعالى ستعلمون بعد حين ((في غضون شهر نوفمبر القادم)) ما ستؤول إليه الأمور من سوء عاقبة داخل الولايات الأمركية المتحدة حين سيصبح بأسهم بينهم شديد على إثر إعلان حالة الطوارئ الجبري الذي ستتخذه الإدارة الأمركية لتحطيم أي معارضة من شأنها عرقلة شن الحرب على إيران .. والهجوم على إيران وشيك رغم المعارضة التي أصبحت أشد <br />
والآن سأعرض عليكم تحقيق مصور لعملية 9/11 متكون من عدة أشرطة مصورة وكذلك تحقيق بحث في عملية ضربة البانطاجون الذي قام به مجموعة الطيارون العالميون بالعلم والوثائق التي تثبت أن البانطجون لم يضرب بطائرة بل بصاروخ حربي أمريكي كذلك طريقة تحطم مباني المركز العالمي للتجارة لم تكن بسبب آرتطام الطائرتان بل من جراء نسف متفجرات قوية جدا كانت قد وضعت في سواري المباني مما تسبب في آنهيارها بطريقة مدروسة بعد تخطيط مسبق من خبراء عالميون لا يمكن بأي حال أن يكونوا ضمن مجموعة التسعة عشر عربي مسلم المزعومة من القاعدة ...<br />
