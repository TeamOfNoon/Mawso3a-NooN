<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Error Page</title>
    <style>
        body {
        
            text-align: center;
           
        }
        h1 {
        
        }
        p {
          
        }
    </style>
    <script>
        // Handle back button press
        function goBack() {
            // Perform your custom action here
            // For example, you can navigate back to the previous page
            window.history.back();
        }
		 function goBack2() {
            // Perform your custom action here
            // For example, you can navigate back to the previous page
            window.parent.location.href = 'index.html';
        }
        // Listen for the back button press
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('backButton').addEventListener('click', goBack);
        });
		 document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('backButton2').addEventListener('click', goBack2);
        });
    </script>
</head>
<body>
    <h1>Page Error</h1>
    <p>Sorry, the page could not be loaded.</p>
	<h1 dir="rtl" >صفحة الخطأ</h1>
    <p dir="rtl">لاسف  صفحة الرابط المطلوب لم  يتم ايجاده !!</p>
    <button id="backButton">Go Back <br> الرجوع للصفحة السابقة</button>
	<button id="backButton2">Go mainpage <br> الذهاب للصفحة الرئيسية</button>
</body>

</script>




</html>
