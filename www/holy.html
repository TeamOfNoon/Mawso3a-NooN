    .jiggly-button {
      position: relative;
      padding: 5px 4px;
    
      color: white;
      border: none;
      border-radius: 50px;
	  
background: 
  radial-gradient(
    ellipse at top,
    rgba(255, 180, 251, 0.4),   /* light pink with 40% opacity */
    rgba(0, 0, 0, 0.1)          /* soft fade to dark */
  ),
  rgba(255, 136, 158, 0.5);     /* base color with 50% opacity */
  
  
  
      outline: none;
      z-index: 0;
      -webkit-transition: all 0.3s ease;
      -moz-transition: all 0.3s ease;
      -o-transition: all 0.3s ease;
      transition: all 0.3s ease;
      will-change: transform;
      margin: 0 5px;
      -webkit-tap-highlight-color: transparent;
    }
	
  

    .no-touch {
       cursor: pointer;
       outline: none;
       -webkit-tap-highlight-color: transparent;
       box-shadow: none;
    }
    
    .jiggly-button.no-touch:not(.active-after):hover::after {
      opacity: 0.6;
    }
    
    .jiggly-button::before,
    .jiggly-button::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50px;
      z-index: -1;
      -webkit-transition: all 0.5s ease;
      -moz-transition: all 0.5s ease;
      -o-transition: all 0.5s ease;
      transition: all 0.5s ease;
    }

    .jiggly-button::before {
      background: -webkit-radial-gradient(ellipse at top, rgba(255,255,255,0.4), rgba(0,0,0,0.1));
      background: -moz-radial-gradient(ellipse at top, rgba(255,255,255,0.4), rgba(0,0,0,0.1));
      background: -o-radial-gradient(ellipse at top, rgba(255,255,255,0.4), rgba(0,0,0,0.1));
      background: radial-gradient(ellipse at top, rgba(255,255,255,0.4), rgba(0,0,0,0.1));
      opacity: 1;
    }

    .jiggly-button::after {
      opacity: 0;
    }

    .jiggly-button.active-after:hover {
      -webkit-transform: none;
      -moz-transform: none;
      -ms-transform: none;
      -o-transform: none;
      transform: none;
    }
   
    .jiggly-button:not(.active-after):hover {
      -webkit-transform: scale(1.1);
      -moz-transform: scale(1.1);
      -ms-transform: scale(1.1);
      -o-transform: scale(1.1);
      transform: scale(1.1);
      z-index: 2;
    }

    .jiggly {
      -webkit-animation: jellyPulse 0.6s ease-in-out forwards;
      -moz-animation: jellyPulse 0.6s ease-in-out forwards;
      -o-animation: jellyPulse 0.6s ease-in-out forwards;
      animation: jellyPulse 0.6s ease-in-out forwards;
    }

    @-webkit-keyframes jellyPulse {
      0%   { -webkit-transform: scale(1, 1); }
      15%  { -webkit-transform: scale(1.05, 0.95); }
      30%  { -webkit-transform: scale(0.95, 1.05); }
      45%  { -webkit-transform: scale(1.03, 0.97); }
      60%  { -webkit-transform: scale(0.97, 1.03); }
      75%  { -webkit-transform: scale(1.01, 0.99); }
      100% { -webkit-transform: scale(1, 1); }
    }

    @-moz-keyframes jellyPulse {
      0%   { -moz-transform: scale(1, 1); }
      15%  { -moz-transform: scale(1.05, 0.95); }
      30%  { -moz-transform: scale(0.95, 1.05); }
      45%  { -moz-transform: scale(1.03, 0.97); }
      60%  { -moz-transform: scale(0.97, 1.03); }
      75%  { -moz-transform: scale(1.01, 0.99); }
      100% { -moz-transform: scale(1, 1); }
    }

    @-o-keyframes jellyPulse {
      0%   { -o-transform: scale(1, 1); }
      15%  { -o-transform: scale(1.05, 0.95); }
      30%  { -o-transform: scale(0.95, 1.05); }
      45%  { -o-transform: scale(1.03, 0.97); }
      60%  { -o-transform: scale(0.97, 1.03); }
      75%  { -o-transform: scale(1.01, 0.99); }
      100% { -o-transform: scale(1, 1); }
    }

    @keyframes jellyPulse {
      0%   { transform: scale(1, 1); }
      15%  { transform: scale(1.05, 0.95); }
      30%  { transform: scale(0.95, 1.05); }
      45%  { transform: scale(1.03, 0.97); }
      60%  { transform: scale(0.97, 1.03); }
      75%  { transform: scale(1.01, 0.99); }
      100% { transform: scale(1, 1); }
    }

    .blue::after {
      background: -webkit-linear-gradient(top, #76B3FA, #4274ae);
      background: -moz-linear-gradient(top, #76B3FA, #4274ae);
      background: -o-linear-gradient(top, #76B3FA, #4274ae);
      background: linear-gradient(to bottom, #76B3FA, #4274ae);
    }

    .green::after {
      background: -webkit-linear-gradient(top, #47d2bf, #1a7a67);
      background: -moz-linear-gradient(top, #47d2bf, #1a7a67);
      background: -o-linear-gradient(top, #47d2bf, #1a7a67);
      background: linear-gradient(to bottom, #47d2bf, #1a7a67);
    }
	
	 .red::after {
      background: -webkit-linear-gradient(to top, #d26647, #7a411a);
      background: -moz-linear-gradient(to top, #d26647, #7a411a);
      background: -o-linear-gradient(to top, #d26647, #7a411a);
      background: linear-gradient(to bottom, #d26647, #7a411a);
    }
	

    .jiggly-button.green.active-after::after {
      background: -webkit-linear-gradient(top, #47d2bf, #1a7a67);

    }

    .jiggly-button.blue.active-after::after {

    }
	
	
    
    @media (hover: none) {
      .jiggly-button:hover {
        -webkit-transform: none !important;
        -moz-transform: none !important;

        -o-transform: none !important;
        transform: none !important;
      }
      .jiggly-button.no-touch:not(.active-after):hover::after {

      }
    }

/* Jelly Show Animation: Reverse of jellyHide */
@-webkit-keyframes jellyShow {
  0%   { -webkit-transform: scale(0, 0); opacity: 0; }
  25%  { -webkit-transform: scale(0.5, 0.5); opacity: 0.3; }
  40%  { -webkit-transform: scale(0.97, 1.03); opacity: 0.5; }
  55%  { -webkit-transform: scale(1.03, 0.97); }
  70%  { -webkit-transform: scale(0.95, 1.05); opacity: 0.8; }
  85%  { -webkit-transform: scale(1.05, 0.95); }
  100% { -webkit-transform: scale(1, 1); opacity: 1; }
}

@keyframes jellyShow {
  0%   { transform: scale(0, 0); opacity: 0; }
  25%  { transform: scale(0.5, 0.5); opacity: 0.3; }
  40%  { transform: scale(0.97, 1.03); opacity: 0.5; }
  55%  { transform: scale(1.03, 0.97); }
  70%  { transform: scale(0.95, 1.05); opacity: 0.8; }
  85%  { transform: scale(1.05, 0.95); }
  100% { transform: scale(1, 1); opacity: 1; }
}







/* Add this new animation for hiding */
@-webkit-keyframes jellyHide {
  0%   { -webkit-transform: scale(1, 1); opacity: 1; }
  15%  { -webkit-transform: scale(1.05, 0.95); }
  30%  { -webkit-transform: scale(0.95, 1.05); opacity: 0.8; }
  45%  { -webkit-transform: scale(1.03, 0.97); }
  60%  { -webkit-transform: scale(0.97, 1.03); opacity: 0.5; }
  75%  { -webkit-transform: scale(0.5, 0.5); opacity: 0.3; }
  100% { -webkit-transform: scale(0, 0); opacity: 0; display: none; }
}

@keyframes jellyHide {
  0%   { transform: scale(1, 1); opacity: 1; }
  15%  { transform: scale(1.05, 0.95); }
  30%  { transform: scale(0.95, 1.05); opacity: 0.8; }
  45%  { transform: scale(1.03, 0.97); }
  60%  { transform: scale(0.97, 1.03); opacity: 0.5; }
  75%  { transform: scale(0.5, 0.5); opacity: 0.3; }
  100% { transform: scale(0, 0); opacity: 0; display: none; }
}

/* Modify the hidden class */
.jelly-menu.hidden {
  -webkit-animation: jellyHide 0.6s ease-in-out forwards;
  -moz-animation: jellyHide 0.6s ease-in-out forwards;
  -o-animation: jellyHide 0.6s ease-in-out forwards;
  animation: jellyHide 0.6s ease-in-out forwards;

}

.menu-toggle-original {
    cursor: pointer;
    border: none;
    background-color: #007bff;
    color: #fff;
    border-radius: 50px;
    -webkit-transition: background-color 0.3s ease;
    -moz-transition: background-color 0.3s ease;
    -ms-transition: background-color 0.3s ease;
    -o-transition: background-color 0.3s ease;
    transition: background-color 0.3s ease;
}

.menu-toggle-original:hover {
   /* background-color: #0056b3;*/
}

.menu-original {
    list-style: none;
    padding: 0;
    margin: 0;
    position: absolute;
    width: 200px;
    max-height: 0;
    overflow: hidden;
}

.menu-original.active {
    max-height: 300px;
}

.menu-original.above {
    bottom: 50px;
}

.menu-original.below {
    top: 50px;
}

.menu-original.scrollable {
    overflow-y: auto;
    overflow-x: hidden;
}

.menu-original li {
    padding: 5px 10px;
    text-align: center;
    background-color: #fff;
    border-radius: 50px;

    /* Box shadow */
    -webkit-box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Safari, older Android */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);

    margin: 8px;
    opacity: 0;

    /* Transform */
    -webkit-transform: scale(0) translateY(0);
    transform: scale(0) translateY(0);

    /* Transform origin */
    -webkit-transform-origin: top center;
    transform-origin: top center;

    /* Transition */
    -webkit-transition: opacity 0.3s ease-in-out, -webkit-transform 0.3s ease-in-out;
    transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
}


.menu-original.below.active li,
.menu-original.above.active li {
    opacity: 1;
    -webkit-transform: scale(1) translateY(0);
    -moz-transform: scale(1) translateY(0);
    -ms-transform: scale(1) translateY(0);
    -o-transform: scale(1) translateY(0);
    transform: scale(1) translateY(0);
}

.menu-original.above.active li {
    -webkit-transform-origin: bottom center;
    -moz-transform-origin: bottom center;
    -ms-transform-origin: bottom center;
    -o-transform-origin: bottom center;
    transform-origin: bottom center;
}

document.addEventListener('DOMContentLoaded', function () {
    var menuWidgets = document.querySelectorAll('.menu-widget-original');

    Array.prototype.forEach.call(menuWidgets, function (widget) {
        var toggleButton = widget.querySelector('.menu-toggle-original');
        var menu = widget.querySelector('.menu-original');
        var isMenuActive = false;

        // Function to calculate and set menu position and max-height
        function positionMenu() {
            var rect = toggleButton.getBoundingClientRect();
            var vh = window.innerHeight;
            var spaceBelow = vh - rect.bottom;
            var spaceAbove = rect.top;
            var menuHeight = menu.scrollHeight;

            // Determine position (above or below)
            if (spaceBelow >= menuHeight || spaceBelow >= spaceAbove) {
                menu.classList.remove('above');
                menu.classList.add('below');
            } else {
                menu.classList.remove('below');
                menu.classList.add('above');
            }

            // Calculate available space and set max-height
            var availableSpace = menu.classList.contains('below') ? spaceBelow : spaceAbove;
            menu.style.maxHeight = (availableSpace - 20) + 'px'; // Always set max-height
            
            // Force reflow to ensure scrollability
            void menu.offsetHeight;
        }

        // Initial state - determine position on load
        menu.style.display = 'block';
        positionMenu();
        menu.style.display = 'none';

        toggleButton.addEventListener('click', function (e) {
            e.stopPropagation(); // Prevent immediate outside click detection
            
            if (isMenuActive) {
                // Hide menu with transition
                menu.classList.remove('active');
                setTimeout(function () {
                    menu.style.display = 'none';
					menu.classList.remove('scrollable');
                }, 300);
            } else {
                // Show menu
                menu.style.display = 'block';
                positionMenu();
                menu.classList.add('scrollable');
                // Force reflow before animation
                void menu.offsetWidth;
                
                menu.classList.add('active');
            }
            isMenuActive = !isMenuActive;
        });

        // Outside click closes menu
        document.addEventListener('click', function (e) {
            if (isMenuActive && !widget.contains(e.target)) {
                menu.classList.remove('active');
                setTimeout(function () {
                    menu.style.display = 'none';
                }, 300);
                isMenuActive = false;
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (isMenuActive) {
                positionMenu();
            }
        });
    });
});
