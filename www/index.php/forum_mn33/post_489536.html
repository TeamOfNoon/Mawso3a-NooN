<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>تَسجيلُ مُتابعةِ التَّذكيرِ لأولي الأبصار من كافَّة قادات البشر المُسالِمين ومن كافَّة أصحاب الرَّحمة الإنسانيَّة تجاه حقوق الإنسان لأخيه الإنسان في العالمين؛ الذين يحبون تحقيق السَّلام العالميّ بين شعوب البشر والتَّعايش السلميّ بين المسلم والكافر، والحريَّة في التَّعبيرِ السياسيّ وحُريَّة الأديان بشرط عدم التَّعدي على حقوق الإنسان؛ فلا ضرر ولا ضرار، فلا إكراه في دين الله الإسلام، فَلَكُم دينكم ولِيَ دينِ، وإنَّما علينا البلاغُ بدين الله الإسلام الذي جاء في القرآن العظيم؛ دين الرَّحمة للعالمين الذي يدعو الإنسان المسلم إلى البرّ والقسط بأخيه الإنسان الكافر مِن الذين لا يحاربون المُسلِمين في دينهم ولم يخرجوهم من ديارهم؛ فأذِن الله للمُسلمين أن يتخذوهم أولياءً ويبرُّوهم ويقسطوا إليهم بالعدل إنَّ الله يُحِب المُقسطين، وهذا هو الدَّستور الحقُّ من الله بين عباده؛ إن الله لا يُحِب المُفسدين في الأرض الذين يريدون علوًّا في الأرض وفسادًا كبيرًا كأمثال الثعلب المَكَّار (دونالد ترامب)، وأفتيناكم عن سياسته الخبيثة من قبل أن يتسلَّم القيادة من (أوباما) في هذه الصفحة رقم واحد لعلَّكم تتذكَّرون بَعد أن تَبيَّن للعالمين أن دونالد ترامب هو حقًّا شيطان البشر الأكبر وهو حقًّا رأسُ الأرهاب العالميّ؛ يُنقضون العهود في كل مرَّةٍ، ولا يَفي بوعدٍ للإصلاح ومنع الفساد في كل مرَّةٍ، وتبيَّن للعالَمين أن (ترامب) هو رأس الإرهاب المُفسِد في الأرض وقبيله (بنيامين) وأولياءهم قلبًا وقالبًا في العالَمين؛ وإنَّا لصادِقون، وذَكِّر فإنَّ الذِّكرى تَنفعُ المؤمنين ..
