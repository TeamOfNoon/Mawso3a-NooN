<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>صاحبُ المَوتِ السَّريري الأمير محمد بن سلمان أفاقه الله من غَيبوبةِ المَوتِ السَّريري من بعد تاريخ: (14 - سبتمبر - 2025 مـ) وكفى بالله شهيدًا. ونسألُ الله له الهِداية، وإذا لم يَعتبر مِن نَذيرِ المَوتِ السَّريري فإن كَوكب سقر هي أدهى وأمرُّ؛ لَيلةُ يَسبقُ اللَّيل النَّهار؛ ليلة مُرورِ كَوكبِ سَقَر يُسببُ انعكاسَ دَورانِ الأرضِ فتُشرِقُ الشَّمسُ مِن الأفقِ الغَربي وتَغربُ بالأفق الشَّرقي، ذلِكمُ عَذابُ يومٍ عَقيمٍ قَبل يَومِ القيامة بِقيام السَّاعةِ؛ بل في خِضَمِّ الحَياة الدُّنيا في عَصرِ أشراطِ السَّاعة الكُبرى، ومن أشراط السَّاعة الكُبرى مُرورُ كَوكبِ سَقَر، ذلِكُم عَذابُ يَومٍ عَقيمٍ؛ يوم يَجعل رؤوسَ الولدانِ الشَّبابِ شِيبًا وقد صَارَ قريبًا؛ تَصديقًا لقول الله تعالى: {فَكَيْفَ تَتَّقُونَ إِن كَفَرْتُمْ يَوْمًا يَجْعَلُ ٱلْوِلْدَٰنَ شِيبًا ‎﴿١٧﴾‏ ٱلسَّمَآءُ مُنفَطِرُۢ بِهِۦ ۚ كَانَ وَعْدُهُۥ مَفْعُولًا ‎﴿١٨﴾‏ إِنَّ هَٰذِهِۦ تَذْكِرَةٌ ۖ فَمَن شَآءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ سَبِيلًا ‎﴿١٩﴾‏} [سُورَةُ المُزَّمِّلِ] ..
