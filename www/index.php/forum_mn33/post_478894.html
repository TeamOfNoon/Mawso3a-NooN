<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>تَحذيرُ الشَّماتة بأيٍّ مِن دُوَل المُسلمين بضربِ طيَران حِلفِ الشَّيطان، فلا تُشَمِّتُوا فيهم الأعداء بحُجَّة عدَم اتِّباع نصيحة الإمام المهديّ ناصِر مُحَمَّد اليَمانيّ، أو حتى التَّذكير ببيان النَّصيحة فهذه اسمها (شَماتة)، بل مَن نَصحناهم سوف يتذكّرون النَّصيحة مِن ذات أنفسِهم مِن دون تذكيرهم، فلا تَصُدُّوهم فلعلّهم يَهتدُونَ حين يتذكَّرون فيقولون: "يا ليتنا أطعنا الله واتَّبعنا نصائِحَ خليفته"؛ فيُمنَع التّذكير بالبيانات القديمة التي تحمِل الانتقاد فالتَّذكيرُ بها الآن يُعتَبَر شماتة وليست نصيحة، فَلِكُلّ حالٍ مقالٍ؛ ومَن أُوتيَ الحِكمة في الدعوة لِلَمِّ شَمل المُسلمين ودواء جِراحِهم فقد أُوتِيَ خيرًا كثيرًا، ولعنةُ الله على ترامب وقبيله بنيامين وأوليائهم المُجرمين مِن شياطين البشر في العالَمين، ونتمنَّى مِن جمهوريّة إيران الإسلاميّة الدِّفاع عن نفسِها بِكُلّ ما أُوتيَت مِن قوّةٍ - إن كانت لا تزال لديهم قُوَّة مُخبَّأة - فأقَل شَيء أن يُحقِّقوا الدِّفاع عن أنفسِهم؛ فهذا واجبٌ وطنيٌّ على كُلِّ إيرانيٍّ مُسلمٍ جِهادًا في سبيل الله ودفاعًا عن أنفسهم، وهذا بيانُ تذكيرٍ للأنصار أن يتَّبِعوا مَسار الحِكمة ولَمِّ شَملِ الأُمَّة الإسلاميّة أجمعين، ونصرٌ عظيمٌ قادِمٌ بأمرٍ مِن عندِ الله قريب؛ وبَشِّر المُؤمنين ..
