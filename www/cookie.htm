<!DOCTYPE html>
<html>
<head>
<title>Thread Scroll Storage</title>

<script>

/* =========================
   STORAGE DETECTION
========================= */

function hasLocalStorage(){

try{

var test="__test__";

localStorage.setItem(test,test);
localStorage.removeItem(test);

return true;

}catch(e){

return false;

}

}

/* =========================
   COOKIE FUNCTIONS
========================= */

function setCookie(name,value){

var d = new Date();

/* 10 years expiration */
d.setTime(d.getTime() + (10*365*24*60*60*1000));

var expires = "; expires=" + d.toGMTString();

document.cookie =
name + "=" + escape(value) +
expires +
"; path=/";

}

function getCookie(name){

var nameEQ = name + "=";
var ca = document.cookie.split(";");

for(var i=0;i<ca.length;i++){

var c = ca[i];

while(c.charAt(0)==" ")
c = c.substring(1);

if(c.indexOf(nameEQ)==0)
return unescape(c.substring(nameEQ.length));

}

return "";

}

/* =========================
   STORAGE FUNCTIONS
========================= */

function setStorage(name,value){

if(hasLocalStorage()){

localStorage.setItem(name,value);

}else{

setCookie(name,value);

}

}

function getStorage(name){

if(hasLocalStorage()){

return localStorage.getItem(name);

}else{

return getCookie(name);

}

}

/* =========================
   SAVE THREAD POSITION
========================= */

function saveThread(threadId,scroll){

var data = getStorage("threads");

var map = {};
var pairs = data ? data.split("|") : [];

for(var i=0;i<pairs.length;i++){

var p = pairs[i].split(":");

map[p[0]] = p[1];

}

map[threadId] = scroll;

var out = [];

for(var k in map){

out.push(k + ":" + map[k]);

}

setStorage("threads",out.join("|"));

}

/* =========================
   GET THREAD POSITION
========================= */

function getThread(threadId){

var data = getStorage("threads");

if(!data) return null;

var pairs = data.split("|");

for(var i=0;i<pairs.length;i++){

var p = pairs[i].split(":");

if(p[0]==threadId)
return p[1];

}

return null;

}

/* =========================
   DEMO
========================= */

function saveDemo(){

var scroll = 22229;
var threadId = 123;

saveThread(threadId,scroll);

alert("Saved thread " + threadId);

}

function loadDemo(){

var threadId = 123;

var pos = getThread(threadId);

alert("Scroll position: " + pos);

}

</script>

</head>

<body>

<h2>Thread Storage Demo</h2>

<button onclick="saveDemo()">Save Scroll</button>
<button onclick="loadDemo()">Load Scroll</button>

</body>
</html>
