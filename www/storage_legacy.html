<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body>

<script>
// SUPER SIMPLE ES3 STORAGE - no JSON polyfill needed, works everywhere

var stor = (function(){
  try {
    if(window.localStorage) {
      return {
        get: function(k){ return localStorage.getItem(k); },
        set: function(k,v){ localStorage.setItem(k, v); }
      };
    }
  } catch(e){}

  var mem = {};

  return {
    get: function(k){
      return mem[k] !== undefined ? mem[k] : null;
    },
    set: function(k,v){
      mem[k] = v;
    }
  };
})();

// defaults
var defaults = {
  userLang: "ar",
  userStyle: "ios",
  userColor: "gold",
  fontSize: "18px",
  searchPerPage: "5",
  highlightSearch: "true",
  highlightpartsearch: "false",
  sniptSearch: "true",
  search_type: "exact",
  search_match: "normal",
  url:"index.php.htm",
  rhsearch:"",
  mn33_sec: "true",
  all_ar_sec: "false",
  all_en_sec: "false",
  custom_sec: "false",
  sheet_state:"sheet_part"
};

function getVal(key){

  var v = stor.get(key);

  if(v === null || v === undefined){

    v = defaults[key];

    if(v !== undefined){
      stor.set(key, v);
    }
  }

  return v;
}

function send(obj){

  if(window.parent && window.parent !== window){

    try{
      window.parent.postMessage(
        JSON.stringify(obj),
        '*'
      );
    }
    catch(e){}
  }
}




function sendCurrentValues(){

    var response = {
        from: 'child',
        type: 'values',
        values: {}
    };

    response.values.userLang        = getVal('userLang');
    response.values.userStyle       = getVal('userStyle');
    response.values.userColor       = getVal('userColor');
    response.values.fontSize        = getVal('fontSize');
    response.values.searchPerPage   = getVal('searchPerPage');
    response.values.highlightSearch = getVal('highlightSearch');
	response.values.highlightpartsearch = getVal('highlightpartsearch');
	
	response.values.sniptSearch = getVal('sniptSearch');
    response.values.search_type     = getVal('search_type');
	response.values.search_match     = getVal('search_match');
    response.values.url             = getVal('url');
	response.values.rhsearch        = getVal('rhsearch');
	response.values.sheet_state        = getVal('sheet_state');

	
	
	response.values.mn33_sec   = getVal('mn33_sec');
response.values.all_ar_sec = getVal('all_ar_sec');
response.values.all_en_sec = getVal('all_en_sec');
response.values.custom_sec = getVal('custom_sec');
	

    response.values.favorite =
        stor.get('favorite') || '';

    var favs =
        stor.get('favorites');

    try{
        response.values.favorites =
            JSON.parse(favs);
    }
    catch(ex){
        response.values.favorites = [];
    }

    send(response);
}










// ======================================
// MESSAGE LISTENER
// ======================================

if(window.addEventListener){

  window.addEventListener('message', function(e){

    var data;

    try{
      data = JSON.parse(e.data);
    }
    catch(ex){
      return;
    }

    if(!data || data.from !== 'parent'){
      return;
    }

    var msg = data.msg;

    // ============================
    // SAVE VALUES
    // ============================

    if(msg.type === 'setValues'){

      var vals = msg.values || {};

      for(var k in vals){

        if(vals.hasOwnProperty(k)){

          stor.set(k, vals[k]);
        }
      }

      var response = {
        from: 'child',
        type: 'values',
        values: {}
      };

      response.values.userLang        = getVal('userLang');
      response.values.userStyle       = getVal('userStyle');
      response.values.userColor       = getVal('userColor');
      response.values.fontSize        = getVal('fontSize');
      response.values.searchPerPage   = getVal('searchPerPage');
      response.values.highlightSearch = getVal('highlightSearch');
	  response.values.highlightpartsearch = getVal('highlightpartsearch');
	  response.values.sniptSearch     = getVal('sniptSearch');
      response.values.search_type     = getVal('search_type');
	  response.values.search_match     = getVal('search_match');
      response.values.url             = getVal('url');
	  response.values.rhsearch        = getVal('rhsearch');
      response.values.mn33_sec   = getVal('mn33_sec');
response.values.all_ar_sec = getVal('all_ar_sec');
response.values.all_en_sec = getVal('all_en_sec');
response.values.custom_sec = getVal('custom_sec');

response.values.sheet_state        = getVal('sheet_state');
	  
	  response.values.favorite =
        stor.get('favorite') || '';

      var favs =
        stor.get('favorites');

      try{
        response.values.favorites =
          JSON.parse(favs);
      }
      catch(ex){
        response.values.favorites = [];
      }

      if(vals.action){
        response.values.action =
          vals.action;
      }

      send(response);
    }

    // ============================
    // GET VALUES
    // ============================

    else if(msg.type === 'getValues'){

      var resp = {
        from: 'child',
        type: 'values',
        values: {}
      };

      var keys =
        msg.keys || [];

      for(var i = 0; i < keys.length; i++){

        var kk = keys[i];

        if(kk === 'favorites'){

          var f =
            stor.get('favorites');

          try{
            resp.values.favorites =
              JSON.parse(f);
          }
          catch(ex){
            resp.values.favorites = [];
          }
        }
        else{

          resp.values[kk] =
            getVal(kk);
        }
      }

      send(resp);
    }
	else if(msg.type === 'refreshValues'){

    sendCurrentValues();
  }

  }, false);
}

// ======================================
// SEND INITIAL VALUES
// ======================================

var init = {
  from: 'child',
  type: 'values',
  values: {}
};

init.values.userLang        = getVal('userLang');
init.values.userStyle       = getVal('userStyle');
init.values.userColor       = getVal('userColor');
init.values.fontSize        = getVal('fontSize');
init.values.searchPerPage   = getVal('searchPerPage');
init.values.highlightSearch = getVal('highlightSearch');
init.values.highlightpartsearch = getVal('highlightpartsearch');
init.values.sniptSearch     = getVal('sniptSearch');
init.values.search_type     = getVal('search_type');
init.values.search_match     = getVal('search_match');
init.values.rhsearch        = getVal('rhsearch');
init.values.url     = getVal('url');

init.values.mn33_sec   = getVal('mn33_sec');
init.values.all_ar_sec = getVal('all_ar_sec');
init.values.all_en_sec = getVal('all_en_sec');
init.values.custom_sec = getVal('custom_sec');

init.values.sheet_state        = getVal('sheet_state');


init.values.favorite =
  stor.get('favorite') || '';

var f =
  stor.get('favorites');

try{
  init.values.favorites =
    JSON.parse(f);
}
catch(ex){
  init.values.favorites = [];
}



send(init);

</script>
