<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=EmulateIE7" />
<title>Parent</title>


<script src="json2.js"></script>
<script src="jquery-1.12.4.min.js"></script>
<script src="jquery.ba-postmessage.js"></script>

<style>
body{
    font-family:Arial;
    padding:20px;
}

iframe{
    width:100%;
    height:300px;
    border:1px solid #999;
    margin-top:20px;
}

.log{
    height:200px;
    overflow:auto;
    border:1px solid #ccc;
    padding:10px;
    background:#f5f5f5;
}

button{
    padding:5px 10px;
}
</style>
</head>

<body>

<h2>PARENT</h2>

<button onclick="sendMulti()">SEND MULTI JSON</button>

<div id="log" class="log"></div>

<iframe
    id="childFrame"
    src="child_iframe.html">
</iframe>

<script>

// ======================================================
// IE6/7 SETTINGS
// ======================================================

jQuery.pm = jQuery.pm || {};

jQuery.pm.poll_time = 100;

// SAME DOMAIN FILE
jQuery.pm.iframe_url = "postmessage.htm";

// ======================================================
// HELPERS
// ======================================================

function log(msg){

    var div =
        document.getElementById("log");

    div.innerHTML +=
        "<div>" + msg + "</div>";

    div.scrollTop =
        div.scrollHeight;
}

// ======================================================
// SEND TO CHILD
// ======================================================

function sendMulti(){

    var iframe =
        document.getElementById("childFrame");

    // MULTI VALUES OBJECT
    var data = {

        type : "batch",

        page : "home",

        dir  : "rtl",

        user : {

            id   : 10,
            name : "John",
            country : "Jordan"
        },

        items : [

            {
                id : 1,
                title : "hello"
            },

            {
                id : 2,
                title : "world"
            },

            {
                id : 3,
                title : "IE6"
            }
        ]
    };

    log(
        "PARENT SEND: " +
        JSON.stringify(data)
    );

    // SEND
    $.postMessage(

        JSON.stringify(data),

        "*",

        iframe.contentWindow
    );
}

// ======================================================
// RECEIVE FROM CHILD
// ======================================================

$.receiveMessage(

    function(event){

        var data =
            event.data;

        // STRING -> OBJECT
        if (
            typeof data === "string"
        ){

            try{

                data =
                    JSON.parse(data);

            }catch(e){}
        }

        if (!data) return;

        log(
            "PARENT RECEIVED: " +
            JSON.stringify(data)
        );

        // EXAMPLES
        if (data.type === "reply"){

            log(
                "MESSAGE = " +
                data.message
            );

            log(
                "STATUS = " +
                data.status
            );
        }

    },

    "*"
);

</script>

</body>
</html>
