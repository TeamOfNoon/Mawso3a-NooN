<script>

var APP_ROOT = location.href.substring(0, location.href.lastIndexOf("/") + 1);
var HEARTBEAT_XHR = null;

function createXHR(){

    if(typeof XMLHttpRequest !== "undefined"){
        try { return new XMLHttpRequest(); } catch(e){}
    }

    try { return new ActiveXObject("Msxml2.XMLHTTP.6.0"); } catch(e){}
    try { return new ActiveXObject("Msxml2.XMLHTTP"); } catch(e){}
    try { return new ActiveXObject("Microsoft.XMLHTTP"); } catch(e){}

    return null;
}

function startHeartbeat(){


    if(location.protocol === "file:") return;

    HEARTBEAT_XHR = createXHR();

    if(!HEARTBEAT_XHR){
        setTimeout(function(){
            var img = new Image();
            img.src = APP_ROOT + "heartbeat?" + Math.random();
        },1000);
        return;
    }

    try{

        HEARTBEAT_XHR.open(
            "GET",
            APP_ROOT + "heartbeat?" + Math.random(),
            true
        );

        try{
            HEARTBEAT_XHR.setRequestHeader("Cache-Control","no-cache");
            HEARTBEAT_XHR.setRequestHeader("Pragma","no-cache");
        }catch(e){}

        HEARTBEAT_XHR.onreadystatechange = function(){

            if(HEARTBEAT_XHR.readyState === 4){
                if(HEARTBEAT_XHR.status !== 200){
                    setTimeout(startHeartbeat,5000);
                }
            }

        };

        HEARTBEAT_XHR.send(null);

    }catch(e){
        setTimeout(startHeartbeat,5000);
    }

}

function monitorConnection(){

    if(!HEARTBEAT_XHR || HEARTBEAT_XHR.readyState === 4){
        startHeartbeat();
    }

    setTimeout(monitorConnection,10000);
}

function stopHeartbeat(){
    if(HEARTBEAT_XHR){
        try { HEARTBEAT_XHR.abort(); } catch(e){}
    }
}

if(window.attachEvent){
    window.attachEvent("onbeforeunload", stopHeartbeat);
    window.attachEvent("onunload", stopHeartbeat);
}else{
    window.addEventListener("beforeunload", stopHeartbeat, false);
    window.addEventListener("unload", stopHeartbeat, false);
}

startHeartbeat();
monitorConnection();

</script>
