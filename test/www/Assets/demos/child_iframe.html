<!DOCTYPE html>
<html>
<head>
<meta http-equiv="X-UA-Compatible" content="IE=EmulateIE7" />
<title>Child</title>

<script src="json2.js"></script>
<script src="jquery-1.12.4.min.js"></script>
<script src="jquery.ba-postmessage.js"></script>

<style>
body{
    font-family:Arial;
    padding:20px;
    background:#fafafa;
}

.log{
    height:200px;
    overflow:auto;
    border:1px solid #ccc;
    padding:10px;
    background:#fff;
}

button{
    padding:5px 10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h3>CHILD IFRAME</h3>

<div id="log" class="log"></div>

<button onclick="sendReply()">
SEND REPLY
</button>

<script>

// ======================================================
// IE6/7 SETTINGS
// ======================================================

jQuery.pm = jQuery.pm || {};

jQuery.pm.poll_time = 100;

jQuery.pm.iframe_url = "postmessage.htm";

// ======================================================
// HELPERS
// ======================================================

function log(msg){

    var div =
        document.getElementById("log");

    div.innerHTML +=
        "<div>" + msg + "</div>";

    div.scrollTop =
        div.scrollHeight;
}

// ======================================================
// RECEIVE FROM PARENT
// ======================================================

$.receiveMessage(

    function(event){

        var data =
            event.data;

        // STRING -> OBJECT
        if (
            typeof data === "string"
        ){

            try{

                data =
                    JSON.parse(data);

            }catch(e){}
        }

        if (!data) return;

        log(
            "CHILD RECEIVED: " +
            JSON.stringify(data)
        );

        // ACCESS VALUES
        log(
            "PAGE = " +
            data.page
        );

        log(
            "DIR = " +
            data.dir
        );

        log(
            "USER NAME = " +
            data.user.name
        );

        // LOOP ITEMS
        if (data.items){

            var i;

            for (
                i = 0;
                i < data.items.length;
                i++
            ){

                log(
                    "ITEM " +
                    data.items[i].id +
                    " = " +
                    data.items[i].title
                );
            }
        }

    },

    "*"
);

// ======================================================
// SEND REPLY
// ======================================================

function sendReply(){

    var reply = {

        type : "reply",

        status : true,

        message : "received ok",

        values : {

            width  : 500,
            height : 300
        },

        list : [

            "A",
            "B",
            "C"
        ]
    };

    log(
        "CHILD SEND: " +
        JSON.stringify(reply)
    );

    $.postMessage(

        JSON.stringify(reply),

        "*",

        window.parent
    );
}

log("CHILD READY");

</script>

</body>
</html>
