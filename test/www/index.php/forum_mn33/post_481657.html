<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>تأثير الاكتشافات الجديدة لمسبار باركر الشمسي على فهمنا للهالة الشمسية ​تشير الدراسة المنشورة في مجلة The Astrophysical Journal إلى اكتشافات قد تُحدث تحولًا كبيرًا في فهمنا لكيفية تسخين الهالة الشمسية. فقد كشف مسبار باركر الشمسي التابع لوكالة ناسا عن بيانات غير متوقعة، مفادها أن الحرارة الهائلة التي تصل إليها الهالة (مليوني درجة مئوية) قد لا تكون ناتجة فقط عن الشمس نفسها. ​مصدر جديد محتمل للحرارة ​عادةً، كان يُعتقد أن حرارة الهالة الشمسية تأتي بشكل أساسي من الطاقة المنبعثة من الشمس. ولكن، تشير البيانات الجديدة إلى أن هناك مصدرًا آخر للحرارة يأتي من اتجاه الجنوب.
