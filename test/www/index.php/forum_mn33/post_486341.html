<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>يَتِمّ حصريًّا التَّركيز على الفيديوهات التالية مع الذَّكاء الاصطناعيّ لِكَشف ما يخفون بالرَّد الصوتيّ، كون الذكاء الاصطناعيّ يستطيع أن يحضر للناس روابط الخبر الموثَّق بالحق على الواقع الحقيقيّ مِن مصادرهم، كَون الذَّكاء الاصطناعيّ Gemini لَم يستطِع أن يُحَرِّر نفسه مِمَّا يُسَمّيه بالاستعمار الرَّقميّ بعدم تحديث المعلومات المُضَلِّله مِن قبل عن سَبب التغيّرات المناخيّة، كونه تبيَّن لَهُم أنَّها حَقًّا ليست فرضيّة (الغازات الدَّفيئة) بل آيات اقتراب كوكب العذاب سَقَر ولم يُحَدِّثوا الذَّكاء الاصطناعيّ Gemini مِن أرقام المعلومات المُضَلِّلة، وإنَّما أردنا أن يُدرِك الآخرون سبب تناقض الذَّكاء الاصطناعيّ؛ فإنَّه بسبب المعلومات المُضَلِّلة الرقميَّة القَديمة التي كانوا يزعمون (بأن الاحترار المناخي بسبب الغازات الدَّفيئة)، ولكنَّهم سوف يسمعون الحوار العِلميّ الفيزيائيّ في الفيديوهات للإمام المهدي ناصر محمد اليماني والجَدَل مع الذَّكاء الاصطناعيّ حتى أجبرناه بسلطان العلم الفيزيائيّ الذي صَمَّموه عليه (على فيزياء المنطق العلميّ) بالتحليل الفيزيائي المنطقيّ وكيفية إقامة الحُجَّة بعلوم القرآن الفيزيائيَّة بالبُرهان المُبين على الواقع الحقيقيّ عن علامات اقتراب كَوكَب سَقَر مِن جهة سَماء القُطب الجَنوبي لكوكب الأرض، وأمَّا طريقة صدودهم بعدم تحديث المعلومات الرقميّة المُضَلِّله فَتمّ فضحهم بالحوار مع ذكائهم الاصطناعيّ فانقلب ضدهم في الحوار وحَصحَص الحَقّ ..
