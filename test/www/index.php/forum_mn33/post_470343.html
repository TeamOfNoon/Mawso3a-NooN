<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"><html dir="rtl" lang="ar"><head><title>عِتابٌ شَديد اللهجَة للأنصار السَّابقين الأخيار فأُحرِجَكُم على العام وأقول: فانتقوا البيانات المُبَشِّرة وليست المُنَفِّرَة من بعد ما تبيَّن لصناع القرار أنَّه الحقّ؛ فلا تستفزوهم ببيانات غَضَب الإمام المهديّ ناصِر مُحَمَّد اليمانيّ بسبب إعراضهم عن الدَّعوة المهديَّة عشرين سَنةً فتأخذهم العزَّة بالإثم؛ فَلِكُلِّ حالٍ مَقال، فاسعوا لوحدة صَفِّ قادتكم ووحدة شعوبكم ودواء جراح أُمَّتكم لنسيان ماضيهم الأليم بالعفو والمُصافحة والمُسامحة مِن شان الله وهو خَير الغافرين والكاظِمين الغَيْظ والعافين عَنِّ الناس والله يُحِب المُحسنين، والتَّذكير بالعَدوِّ الحَقيقيّ، أم تُريدون من الإمام المِهديّ كتابة بَيانٍ جَديدٍ حين تتبيَّن الأحداث؟ ولَكنّي لَستُ صحفيًّا إعلاميًّا يكتب حِين الحَدَث! بل نُفَصِّل الأحداث مِن قَبْل الحدَث تَفصيلًا، ونأمُركم وكافَّة المُسلمين لِرَبِّ العالَمين بِنَشر البَيان على الرَّابِط التالي واحرِصوا على تاريخه يَوم تنزيله ..
