<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html dir="rtl" id="htmlRoot">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>VScroll Pro - Smart Virtual Scroll Plugin (IE6+ Compatible)</title>
<style>
*{
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
body {
    overflow: hidden;
    margin: 0;
    font-family: Tahoma;
    background: #e5e5e5;
}
#scrollParent {
    height: 100%;
    overflow: hidden;
    background: #fff;
    position: relative;
    zoom: 1;
    _height: 100%;
}
.custom-scroll-container {
    position: relative;
    height: 100%;
    width: 100%;
    overflow: hidden;
}
.scroll-content {
    position: absolute;
    top: 0;
    overflow-y: hidden;
    overflow-x: hidden;
    height: 100%;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
.scroll-content::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}
#searchResList {
    position: relative;
    background: #fafafa;
    zoom: 1;
}
.custom-scrollbar {
    position: absolute;
    top: 0;
    width: 10px;
    height: 100%;
    background: #e0e0e0;
    z-index: 1000;
    cursor: pointer;
    border-radius: 5px;
}
.custom-thumb {
    position: absolute;
    top: 0;
    width: 8px;
    background: #888;
    cursor: pointer;
    z-index: 1001;
    border-radius: 4px;
}
.custom-thumb:hover { background: #666; }
.custom-thumb:active { background: #444; }
#vscroll_header {
    margin: 5px;
    border: 2px solid #ccc;
    width: auto;
    zoom: 1;
}
.toggleBtn {
    padding: 4px 10px;
    background: #dcdcdc;
    border: 1px solid #999;
    cursor: pointer;
    font-size: 12px;
    display: inline-block;
}
#headerContent {
    padding: 10px;
    display: none;
}
#vscroll_wrapper {
    position: relative;
    zoom: 1;
}
.vscroll-item {
    position: absolute;
    width: 100%;
    zoom: 1;
}
.vscroll-item-inner {
    margin: 5px;
    border: 1px solid #999;
}
.wSearchResultItemSmallScr {
    background: #fff;
    padding: 6px;
    margin: 0;
    border-bottom: 1px solid #e5e5e5;
}
.wSearchResultItemSmallScr:hover { background: #eef3ff; }
.hit a {
    color: #0033aa;
    font-weight: bold;
    text-decoration: none;
}
.hit a:hover { text-decoration: underline; }
@media (pointer: coarse) {
    .custom-scrollbar { width: 12px; }
    .custom-thumb { width: 10px; min-height: 44px; }
}
</style>
</head>

<div id="scrollParent">
    <div class="custom-scroll-container">
        <div class="scroll-content" id="scrollContent">
            <div id="searchResList">
                <div id="vscroll_header">
                    <div class="toggleBtn" id="toggleBtn">Toggle</div>
                    <div id="headerContent" style="display:none;">

    <input type="checkbox"> Option 1<br>

    <!-- 🔥 NEW CONTROLS -->

    <br><br>

</div>
                </div>

<script>
// ============================================================================
// VScrollPro Plugin - Complete Virtual Scroll with All Original IE6+ Logic
// Preserves ALL functionality: drag, inertia, wheel, custom scrollbar, RTL
// Includes destroy() method for proper cleanup
// ============================================================================
(function(window, document, undefined) {
    "use strict";
    
    // Polyfill for Date.now (IE6-8)
    if (!Date.now) {
        Date.now = function() { return new Date().getTime(); };
    }
    
    // Helper: get element by class name (IE6 compatible)
    function getByClass(cls, root) {
        root = root || document;
        var all = root.getElementsByTagName("*");
        for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if ((" " + el.className + " ").indexOf(" " + cls + " ") > -1) {
                return el;
            }
        }
        return null;
    }
    
    // Helper: get absolute height including margins
    function getAbsoluteHeight(el) {
        if (!el) return 0;
        var oh = el.offsetHeight || 0, mt = 0, mb = 0;
        if (el.currentStyle) {
            mt = parseInt(el.currentStyle.marginTop, 10) || 0;
            mb = parseInt(el.currentStyle.marginBottom, 10) || 0;
        }
        return oh + mt + mb;
    }
    
    // Helper: add event (cross-browser IE6+)
    function addEvent(el, type, handler) {
        if (el.attachEvent) {
            el.attachEvent("on" + type, handler);
        } else {
            el.addEventListener(type, handler, false);
        }
    }
    
    // Helper: remove event (cross-browser IE6+)
    function removeEvent(el, type, handler) {
        if (el.detachEvent) {
            el.detachEvent("on" + type, handler);
        } else {
            el.removeEventListener(type, handler, false);
        }
    }
    
    // Helper: prevent default
    function preventDefault(e) {
        if (e.preventDefault) e.preventDefault();
        if (e.returnValue !== undefined) e.returnValue = false;
        return false;
    }
    
    // Helper: get client Y from event
    function getClientY(e) {
        if (e.touches) return e.touches[0].clientY;
        if (e.clientY !== undefined) return e.clientY;
        if (e.pageY !== undefined) return e.pageY;
        return 0;
    }
    
    // ========== VScrollPro Constructor ==========
    function VScrollPro(options) {
        if (!(this instanceof VScrollPro)) return new VScrollPro(options);
        
        var defaults = {
            containerId: "scrollContent",
            wrapperId: "vscroll_wrapper",
            rowsAId: "rowsA",
            rowsBId: "rowsB",
            headerId: "vscroll_header",
            scrollbarId: "customScrollbar",
            thumbId: "customThumb",
            data: [],
            itemHeight: 0
        };
        
        for (var key in defaults) {
            this[key] = (options && options[key] !== undefined) ? options[key] : defaults[key];
        }
        
        // DOM elements
        this.scrollContent = document.getElementById(this.containerId);
        this.wrapper = document.getElementById(this.wrapperId);
        this.header = document.getElementById(this.headerId);
        this.rowsA = document.getElementById(this.rowsAId);
        this.rowsB = document.getElementById(this.rowsBId);
        this.scrollbarEl = document.getElementById(this.scrollbarId);
        this.thumbEl = document.getElementById(this.thumbId);
        
        if (!this.scrollContent || !this.wrapper) {
            throw new Error("VScrollPro: required DOM elements not found");
        }
        
        // State
        this.active = this.rowsA;
        this.passive = this.rowsB;
        this.data = this.data || [];
        this.itemHeight = this.itemHeight || 0;
        this.startIndex = -1;
        this.totalHeight = 0;
        this.updateTimer = null;
        this.isUpdating = false;
        this.lastScrollTop = 0;
        this.renderLock = false;
        this.destroyed = false;

        // click highlight state
        this._selectedIndex = -1;
        this._dragMovedFlag = false;
        this._clickResetTimer = null;
        
        // Store all timer IDs for cleanup
        this._timers = [];
        
        // Measure item if needed
        if (this.itemHeight <= 0 && this.data.length > 0) {
            this._measureItem(this.data[0]);
        } else if (this.itemHeight <= 0) {
            this.itemHeight = 60;
        }
        
        // Initialize all components
        this._init();
    }
    
    // ========== Virtual Scroll Core Methods ==========
    VScrollPro.prototype._measureItem = function(html) {
        var t = document.createElement("div");
        t.className = "wSearchResultItemSmallScr";
        t.style.position = "absolute";
        t.style.visibility = "hidden";
        t.style.left = "-9999px";
        t.style.width = "500px";
        t.innerHTML = html;
        document.body.appendChild(t);
        this.itemHeight = getAbsoluteHeight(t);
        document.body.removeChild(t);
        if (this.itemHeight <= 0) this.itemHeight = 60;
    };
    
    VScrollPro.prototype._getOptimalBufferSize = function() {
        var viewportHeight = this.scrollContent.clientHeight;
        var visibleItems = Math.ceil(viewportHeight / this.itemHeight);
        var buffer = Math.max(15, Math.min(60, Math.ceil(visibleItems * 1.5)));
        return buffer;
    };
    
    VScrollPro.prototype._build = function(container) {
        container.innerHTML = "";
        var fragment = document.createDocumentFragment();
        var scrollTop = this.scrollContent.scrollTop;
        var headerHeight = getAbsoluteHeight(this.header);
        var adjScroll = Math.max(0, scrollTop - headerHeight);
        var viewportHeight = this.scrollContent.clientHeight;
        
        var firstVisible = Math.floor(adjScroll / this.itemHeight);
        var lastVisible = Math.ceil((adjScroll + viewportHeight) / this.itemHeight);
        var bufferSize = this._getOptimalBufferSize();
        var bufferStart = Math.max(0, firstVisible - bufferSize);
        var bufferEnd = Math.min(this.data.length, lastVisible + bufferSize);
        
        for (var i = bufferStart; i < bufferEnd; i++) {
            var d = document.createElement("div");
            d.className = "vscroll-item";
d.style.height = this.itemHeight + "px";
d.style.top = (i * this.itemHeight) + "px";
d.setAttribute("data-index", i);   // ✅ FIX
d.innerHTML = this.data[i];
            fragment.appendChild(d);
        }
         container.appendChild(fragment);
        this.startIndex = firstVisible;
        this._applyHighlight();
    };
    
      VScrollPro.prototype._swap = function() {
        this.active.style.display = "none";
        this.passive.style.display = "block";
        var tmp = this.active;
        this.active = this.passive;
        this.passive = tmp;
        this._applyHighlight();
    };
    
    VScrollPro.prototype.updateImmediate = function() {
        if (this.renderLock || this.destroyed) return;
        this.renderLock = true;
        try {
            var topH = getAbsoluteHeight(this.header);
            var scrollTop = this.scrollContent.scrollTop;
            var adj = scrollTop - topH;
            if (adj < 0) adj = 0;
            var start = Math.floor(adj / this.itemHeight);
            var scrollDelta = Math.abs(scrollTop - this.lastScrollTop);
            if (Math.abs(start - this.startIndex) > 2 || this.startIndex === -1 || scrollDelta > this.itemHeight * 2) {
                this.startIndex = start;
                this.lastScrollTop = scrollTop;
                this._build(this.passive);
                this._swap();
            }
        } finally {
            this.renderLock = false;
        }
    };
    
    VScrollPro.prototype.updateAfterDrag = function() {
        if (this.destroyed) return;
        var self = this;
        if (this.updateTimer) clearTimeout(this.updateTimer);
        this.updateTimer = setTimeout(function() {
            self.updateImmediate();
            self.updateTimer = null;
        }, 40);
        this._timers.push(this.updateTimer);
    };
    
    VScrollPro.prototype.updateThrottled = function() {
        if (this.destroyed) return;
        var self = this;
        if (!this.isUpdating) {
            this.isUpdating = true;
            var timer = setTimeout(function() {
                self.updateImmediate();
                self.updateThumb();
                self.isUpdating = false;
            }, 16);
            this._timers.push(timer);
        }
    };
    
    VScrollPro.prototype.updateThumb = function() {
        if (this.destroyed || !this.scrollbarEl || !this.thumbEl) return;
        var scrollTop = this.scrollContent.scrollTop;
        var scrollHeight = this.scrollContent.scrollHeight;
        var clientHeight = this.scrollContent.clientHeight;
        
        if (scrollHeight <= clientHeight) {
            this.scrollbarEl.style.display = "none";
            return;
        }
        this.scrollbarEl.style.display = "block";
        var trackHeight = this.scrollbarEl.offsetHeight;
        var innerTrackHeight = this.scrollbarEl.clientHeight;
        var thumbHeight = Math.max(30, Math.floor((clientHeight / scrollHeight) * innerTrackHeight));
        if (thumbHeight > innerTrackHeight) thumbHeight = innerTrackHeight;
        this.thumbEl.style.height = thumbHeight + "px";
        
        var maxScrollTop = scrollHeight - clientHeight;
        var maxThumbTop = innerTrackHeight - thumbHeight;
        var thumbTop = 0;
        if (maxScrollTop > 0) {
            thumbTop = (scrollTop / maxScrollTop) * maxThumbTop;
        }
        if (thumbTop < 0) thumbTop = 0;
        if (thumbTop > maxThumbTop) thumbTop = maxThumbTop;
        thumbTop = Math.round(thumbTop);
        this.thumbEl.style.top = thumbTop + "px";
        
        if (this.thumbEl.offsetTop + this.thumbEl.offsetHeight > innerTrackHeight) {
            this.thumbEl.style.top = (innerTrackHeight - this.thumbEl.offsetHeight) + "px";
        }
    };
    
    VScrollPro.prototype.refresh = function() {
        if (this.destroyed) return;
        this.totalHeight = this.data.length * this.itemHeight;
        this.wrapper.style.height = this.totalHeight + "px";
        this.updateThumb();
        this.updateImmediate();
    };
    
    // ========== CONTINUOUS DRAG SCROLLER - PRESERVED ORIGINAL LOGIC ==========
    VScrollPro.prototype._initDragScroller = function() {
        var that = this;
        var el = this.scrollContent;
        
        // Drag state variables (matches original structure)
        var isDragging = false;
        var startY = 0;
        var startScrollTop = 0;
        var lastY = 0;
        var lastTime = 0;
        var velocity = 0;
        var inertiaTimer = null;
        var velocitySamples = [];
        var dragMoved = false;
        var dragThreshold = 6;
        
        // Store references for destroy
        this._dragStateRef = {
            inertiaTimer: function() { return inertiaTimer; }
        };
        
        function setScrollTop(value) {
            var maxScroll = el.scrollHeight - el.clientHeight;
            value = Math.max(0, Math.min(value, maxScroll));
            el.scrollTop = value;
            that.updateThumb();
            that.updateThrottled();
            return value;
        }
        
        function updateVelocity(currentY, currentTime) {
            var dt = currentTime - lastTime;
            if (dt > 0 && dt < 100) {
                var yDelta = currentY - lastY;
                var instantVel = yDelta / dt;
                velocitySamples.push(instantVel);
                if (velocitySamples.length > 3) {
                    velocitySamples.shift();
                }
                var sum = 0;
                for (var i = 0; i < velocitySamples.length; i++) {
                    sum += velocitySamples[i];
                }
                velocity = sum / velocitySamples.length;
            }
            lastY = currentY;
            lastTime = currentTime;
        }
        
        function startInertia() {
            if (Math.abs(velocity) < 0.1) return;
            var startScrollTopVal = el.scrollTop;
            var startTime = Date.now();
            var currentVelocity = velocity;
            
            function step() {
                var now = Date.now();
                var dt = Math.min(32, now - startTime);
                if (dt <= 0) {
                    inertiaTimer = setTimeout(step, 16);
                    return;
                }
                var friction = 0.94;
                currentVelocity = currentVelocity * Math.pow(friction, dt / 16);
                if (Math.abs(currentVelocity) < 0.2) {
                    inertiaTimer = null;
                    that.updateAfterDrag();
                    return;
                }
                var deltaScroll = currentVelocity * dt;
                var newScrollTop = startScrollTopVal - deltaScroll;
                setScrollTop(newScrollTop);
                startScrollTopVal = newScrollTop;
                startTime = now;
                inertiaTimer = setTimeout(step, 16);
            }
            step();
        }
        
        function onDragStart(e) {
            e = e || window.event;
            var target = e.target || e.srcElement;
            
            if (target.id === "customThumb" || target.id === "customScrollbar") return;
            var thumbEl = document.getElementById("customThumb");
            if (thumbEl && (target === thumbEl || (thumbEl.contains && thumbEl.contains(target)))) return;
            
            isDragging = true;
            dragMoved = false;
			
			that._dragMovedFlag = false;
            
			
			startY = getClientY(e);
            startScrollTop = el.scrollTop;
            lastY = startY;
            lastTime = Date.now();
            velocity = 0;
            velocitySamples = [];
            
            if (inertiaTimer) {
                clearTimeout(inertiaTimer);
                inertiaTimer = null;
            }
            return true;
        }
        
       function onDragMove(e) {
            if (!isDragging) return;
            e = e || window.event;
            var currentY = getClientY(e);
            var deltaY = currentY - startY;
            
            if (Math.abs(deltaY) > dragThreshold) {
                dragMoved = true;
                that._dragMovedFlag = true;
            }
            
            if (dragMoved) {
                var newScrollTop = startScrollTop - deltaY;
                setScrollTop(newScrollTop);
                updateVelocity(currentY, Date.now());
                preventDefault(e);
                return false;
            }
        }
        
               function onDragEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            if (!dragMoved) {
                if (that._clickResetTimer) clearTimeout(that._clickResetTimer);
                that._clickResetTimer = setTimeout(function() {
                    that._dragMovedFlag = false;
                }, 30);
                return true;
            }

            if (Math.abs(velocity) > 0.15) {
                startInertia();
            } else {
                that.updateAfterDrag();
            }

            if (that._clickResetTimer) clearTimeout(that._clickResetTimer);
            that._clickResetTimer = setTimeout(function() {
                that._dragMovedFlag = false;
            }, 80);

            if (e) preventDefault(e);
            return false;
        }
        
        // Store bound handlers for cleanup
        this._dragHandlers = {
            onDragStart: onDragStart,
            onDragMove: onDragMove,
            onDragEnd: onDragEnd
        };
        
        // IE6+ compatible event binding (exactly as original)
        if (el.attachEvent) {
            el.attachEvent("onmousedown", onDragStart);
            document.attachEvent("onmousemove", onDragMove);
            document.attachEvent("onmouseup", onDragEnd);
            el.attachEvent("ontouchstart", onDragStart);
            document.attachEvent("ontouchmove", onDragMove);
            document.attachEvent("ontouchend", onDragEnd);
        } else {
            el.addEventListener("mousedown", onDragStart);
            window.addEventListener("mousemove", onDragMove);
            window.addEventListener("mouseup", onDragEnd);
            el.addEventListener("touchstart", onDragStart, { passive: false });
            window.addEventListener("touchmove", function(e) {
                if (isDragging) {
                    e.preventDefault();
                    onDragMove(e);
                }
            }, { passive: false });
            window.addEventListener("touchend", onDragEnd);
            window.addEventListener("touchcancel", onDragEnd);
        }
    };
	
	VScrollPro.prototype.scrollToSelected = function () {
    if (this._selectedIndex < 0) return;

    var targetTop = this._selectedIndex * this.itemHeight;

    this.scrollContent.scrollTop = targetTop;

    this.updateImmediate();
    this.updateThumb();
    this._applyHighlight();
};



VScrollPro.prototype.scrollToIndex = function (index) {
    index = parseInt(index, 10);

    if (isNaN(index)) return;
    if (index < 0) index = 0;
    if (index >= this.data.length) index = this.data.length - 1;

    this._selectedIndex = index;

    var targetTop = index * this.itemHeight;

    this.scrollContent.scrollTop = targetTop;

    this.updateImmediate();
    this.updateThumb();
    this._applyHighlight();
};




	    // ========== CLICK + PRESERVED HIGHLIGHT ==========
    VScrollPro.prototype._initClickHighlight = function() {
        var that = this;
        var container = this.scrollContent;

        function findAnchor(target) {
            while (target) {
                if (target.tagName && target.tagName.toUpperCase() === "A") return target;
                target = target.parentNode;
            }
            return null;
        }

        function findRow(target) {
            while (target) {
                if (target.className && (" " + target.className + " ").indexOf(" vscroll-item ") > -1) {
                    return target;
                }
                target = target.parentNode;
            }
            return null;
        }

        function onClick(e) {
            e = e || window.event;

            if (that._dragMovedFlag) return true;

            var target = e.target || e.srcElement;
            var anchor = findAnchor(target);
            if (!anchor) return true;

            var rowEl = findRow(anchor);
            if (!rowEl) return true;

            var rowIndex = parseInt(rowEl.getAttribute("data-index"), 10);

            that._selectedIndex = rowIndex;
            that._applyHighlight();

            alert("ROW ID: " + rowIndex);

            if (e.preventDefault) e.preventDefault();
            e.returnValue = false;
            return false;
        }

        this._clickHighlightHandler = onClick;

        if (container.attachEvent) {
            container.attachEvent("onclick", onClick);
        } else {
            container.addEventListener("click", onClick, false);
        }
    };
	
	
	
	
       
	   // ========== APPLY CLICK HIGHLIGHT ==========
    VScrollPro.prototype._applyHighlight = function() {
        var selectedIndex = this._selectedIndex;
        var wrapper = this.wrapper;
        var i, j, el, top, index, links;

        if (!wrapper) return;

        var all = wrapper.getElementsByTagName("div");

        for (i = 0; i < all.length; i++) {
            el = all[i];

            if (el.className && (" " + el.className + " ").indexOf(" vscroll-item ") > -1) {
               index = parseInt(el.getAttribute("data-index"), 10);
                links = el.getElementsByTagName("a");

                for (j = 0; j < links.length; j++) {
                    if (index === selectedIndex) {
                        links[j].style.backgroundColor = "#ff5722";
                        links[j].style.color = "#ffffff";
                    } else {
                        links[j].style.backgroundColor = "";
                        links[j].style.color = "";
                    }
                }
            }
        }
    };
    // ========== CUSTOM SCROLLBAR - PRESERVED ORIGINAL LOGIC ==========
    VScrollPro.prototype._initCustomScrollbar = function() {
        var that = this;
        var scrollContent = this.scrollContent;
        var thumb = this.thumbEl;
        var track = this.scrollbarEl;
        var isDragging = false;
        var startY = 0;
        var startThumbTop = 0;
        
        function getScrollableRange() {
            var scrollHeight = scrollContent.scrollHeight;
            var clientHeight = scrollContent.clientHeight;
            var trackHeight = track.clientHeight;
            var thumbHeight = thumb.clientHeight;
            var maxScrollTop = scrollHeight - clientHeight;
            var maxThumbTop = trackHeight - thumbHeight;
            return { maxScrollTop: maxScrollTop, maxThumbTop: maxThumbTop };
        }
        
        function setScrollFromThumb(thumbTop) {
            var range = getScrollableRange();
            if (range.maxThumbTop <= 0) return;
            var scrollRatio = thumbTop / range.maxThumbTop;
            var newScrollTop = scrollRatio * range.maxScrollTop;
            scrollContent.scrollTop = newScrollTop;
            that.updateThumb();
            that.updateAfterDrag();
        }
        
        function onThumbDown(e) {
            e = e || window.event;
            isDragging = true;
            startY = getClientY(e);
            startThumbTop = parseFloat(thumb.style.top) || 0;
            if (e.preventDefault) e.preventDefault();
            if (thumb.setCapture) thumb.setCapture();
            return false;
        }
        
        function onDragMove(e) {
            if (!isDragging) return;
            e = e || window.event;
            var currentY = getClientY(e);
            var deltaY = currentY - startY;
            var newThumbTop = startThumbTop + deltaY;
            var range = getScrollableRange();
            newThumbTop = Math.max(0, Math.min(newThumbTop, range.maxThumbTop));
            thumb.style.top = newThumbTop + "px";
            setScrollFromThumb(newThumbTop);
            if (e.preventDefault) e.preventDefault();
            if (e.cancelBubble !== undefined) e.cancelBubble = true;
            return false;
        }
        
        function onDragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            if (thumb.releaseCapture) thumb.releaseCapture();
            if (e && e.preventDefault) e.preventDefault();
        }
        
        function onTrackClick(e) {
            e = e || window.event;
            var target = e.target || e.srcElement;
            if (target === thumb || (thumb.contains && thumb.contains(target))) return;
            var clickY = getClientY(e);
            var trackRect = track.getBoundingClientRect();
            var clickOffset = clickY - trackRect.top;
            var thumbHeight = thumb.clientHeight;
            var newThumbTop = clickOffset - (thumbHeight / 2);
            var range = getScrollableRange();
            newThumbTop = Math.max(0, Math.min(newThumbTop, range.maxThumbTop));
            thumb.style.top = newThumbTop + "px";
            setScrollFromThumb(newThumbTop);
            if (e.preventDefault) e.preventDefault();
        }
        
        this._scrollbarHandlers = {
            onThumbDown: onThumbDown,
            onDragMove: onDragMove,
            onDragEnd: onDragEnd,
            onTrackClick: onTrackClick
        };
        
        // IE6+ compatible event binding (exactly as original)
        if (thumb.attachEvent) {
            thumb.attachEvent("onmousedown", onThumbDown);
            document.attachEvent("onmousemove", onDragMove);
            document.attachEvent("onmouseup", onDragEnd);
            track.attachEvent("onclick", onTrackClick);
            thumb.attachEvent("ontouchstart", function(e) { e.preventDefault(); onThumbDown(e); });
            document.attachEvent("ontouchmove", function(e) { if (isDragging) { e.preventDefault(); onDragMove(e); } });
            document.attachEvent("ontouchend", function(e) { if (isDragging) { e.preventDefault(); onDragEnd(e); } });
        } else {
            thumb.addEventListener("mousedown", onThumbDown);
            window.addEventListener("mousemove", onDragMove);
            window.addEventListener("mouseup", onDragEnd);
            track.addEventListener("click", onTrackClick);
            thumb.addEventListener("touchstart", function(e) { e.preventDefault(); onThumbDown(e); });
            window.addEventListener("touchmove", function(e) { if (isDragging) { e.preventDefault(); onDragMove(e); } }, { passive: false });
            window.addEventListener("touchend", onDragEnd);
        }
        
        that.updateThumb();
    };
    
    // ========== WHEEL SCROLLING - PRESERVED ORIGINAL LOGIC ==========
    VScrollPro.prototype._initWheelScroll = function() {
        var that = this;
        var el = this.scrollContent;
        var wheelVelocity = 0;
        var wheelTimer = null;
        
        function startSmoothScroll() {
            wheelTimer = setInterval(function() {
                if (Math.abs(wheelVelocity) < 0.2) {
                    clearInterval(wheelTimer);
                    wheelTimer = null;
                    that.updateAfterDrag();
                    return;
                }
                var maxScroll = el.scrollHeight - el.clientHeight;
                el.scrollTop -= wheelVelocity;
                if (el.scrollTop < 0) el.scrollTop = 0;
                if (el.scrollTop > maxScroll) el.scrollTop = maxScroll;
                wheelVelocity *= 0.92;
                that.updateThumb();
                that.updateThrottled();
            }, 16);
        }
        
        function handleWheel(e) {
            e = e || window.event;
            var delta = 0;
            if (e.wheelDelta) delta = e.wheelDelta / 120;
            else if (e.detail) delta = -e.detail / 3;
            
            wheelVelocity += delta * 12;
            if (wheelVelocity > 45) wheelVelocity = 45;
            if (wheelVelocity < -45) wheelVelocity = -45;
            
            if (!wheelTimer) startSmoothScroll();
            if (e.preventDefault) e.preventDefault();
            return false;
        }
        
        this._wheelHandlers = {
            handleWheel: handleWheel,
            wheelTimerRef: function() { return wheelTimer; }
        };
        
        if (el.addEventListener) {
            el.addEventListener("wheel", handleWheel, { passive: false });
            el.addEventListener("mousewheel", handleWheel, false);
            el.addEventListener("DOMMouseScroll", handleWheel, false);
        } else if (el.attachEvent) {
            el.attachEvent("onmousewheel", handleWheel);
        }
    };
    
    // ========== RTL/LTR POSITIONING - PRESERVED ORIGINAL ==========
    VScrollPro.prototype._positionByDir = function() {
        var htmlElement = document.getElementById("htmlRoot") || document.documentElement;
        var dirValue = htmlElement.getAttribute ? htmlElement.getAttribute("dir") : htmlElement.dir;
        var isRTL = (dirValue === "rtl");
        var scrollContent = this.scrollContent;
        var scrollbar = this.scrollbarEl;
        var thumb = this.thumbEl;
        var container = getByClass("custom-scroll-container");
        var headerDiv = this.header;
        var searchResList = document.getElementById("searchResList");
        var wrapper = this.wrapper;
        
        if (!scrollContent || !scrollbar) return;
        
        if (isRTL) {
            scrollbar.style.left = "0";
            scrollbar.style.right = "auto";
            scrollContent.style.left = "12px";
            scrollContent.style.right = "0";
            if (thumb) thumb.style.left = "1px";
            if (headerDiv) headerDiv.style.marginRight = "5px";
            if (searchResList) searchResList.style.direction = "rtl";
            if (wrapper) wrapper.style.direction = "rtl";
            if (container) container.style.direction = "rtl";
        } else {
            scrollbar.style.right = "0";
            scrollbar.style.left = "auto";
            scrollContent.style.right = "12px";
            scrollContent.style.left = "0";
            if (thumb) thumb.style.left = "1px";
            if (headerDiv) headerDiv.style.marginLeft = "5px";
            if (searchResList) searchResList.style.direction = "ltr";
            if (wrapper) wrapper.style.direction = "ltr";
            if (container) container.style.direction = "ltr";
        }
        
        var self = this;
        setTimeout(function() { if (!self.destroyed) { self.refresh(); self.updateThumb(); } }, 10);
    };
    
    VScrollPro.prototype._watchDirChanges = function() {
        var self = this;
        var htmlElement = document.getElementById("htmlRoot") || document.documentElement;
        if (window.MutationObserver) {
            var observer = new MutationObserver(function() { self._positionByDir(); });
            observer.observe(htmlElement, { attributes: true });
            this._dirObserver = observer;
        } else {
            var lastDir = htmlElement.getAttribute ? htmlElement.getAttribute("dir") : htmlElement.dir;
            this._dirInterval = setInterval(function() {
                var newDir = htmlElement.getAttribute ? htmlElement.getAttribute("dir") : htmlElement.dir;
                if (newDir !== lastDir) { lastDir = newDir; self._positionByDir(); }
            }, 200);
            this._timers.push(this._dirInterval);
        }
    };
    
    // ========== RESIZE HANDLER ==========
    VScrollPro.prototype._initResize = function() {
        var self = this;
        this._resizeHandler = function() {
            setTimeout(function() { if (!self.destroyed) { self.refresh(); self.updateThumb(); } }, 10);
        };
        if (window.addEventListener) {
            window.addEventListener("resize", this._resizeHandler);
        } else if (window.attachEvent) {
            window.attachEvent("onresize", this._resizeHandler);
        }
    };
    
    // ========== SCROLL EVENT ==========
    VScrollPro.prototype._initScrollEvent = function() {
        var self = this;
        this._scrollHandler = function() { self.updateThrottled(); };
        if (this.scrollContent.attachEvent) {
            this.scrollContent.attachEvent("onscroll", this._scrollHandler);
        } else {
            this.scrollContent.addEventListener("scroll", this._scrollHandler);
        }
    };
    // ========== PREVENT TEXT SELECTION (PLUGIN SCOPED) ==========
    VScrollPro.prototype._initSelectionBlock = function() {
    var that = this;
    var el = this.scrollContent;

    function isInteractive(target) {
        if (!target) return false;
        var tag = target.tagName;
        if (!tag) return false;

        tag = tag.toUpperCase();

        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || tag === "BUTTON") {
            return true;
        }

        if (target.isContentEditable) return true;

        return isInteractive(target.parentNode);
    }

    function prevent(e) {
        e = e || window.event;
        var target = e.target || e.srcElement;

        // ✅ allow clicks on links / inputs
        if (isInteractive(target)) return true;

        if (e.preventDefault) e.preventDefault();
        e.returnValue = false;
        return false;
    }

    // ===== IE6-8 =====
    el.onselectstart = prevent;
    el.ondragstart   = prevent;

    // ===== MODERN =====
    if (el.addEventListener) {
        el.addEventListener("selectstart", prevent, false);
        el.addEventListener("dragstart", prevent, false);
    } else if (el.attachEvent) {
        el.attachEvent("onselectstart", prevent);
        el.attachEvent("ondragstart", prevent);
    }
   };
    // ========== PUBLIC API ==========
    VScrollPro.prototype.toggleHeader = function() {
        var c = document.getElementById("headerContent");
        if (c) {
            var isHidden = (c.style.display === "none") || (c.style.display === "" && c.currentStyle && c.currentStyle.display === "none");
            c.style.display = isHidden ? "block" : "none";
        }
        this.refresh();
    };
    
    VScrollPro.prototype.setData = function(newData) {
        this.data = newData || [];
        if (this.data.length > 0 && this.itemHeight <= 0) {
            this._measureItem(this.data[0]);
        }
        this.refresh();
    };
    
    VScrollPro.prototype.destroy = function() {
        if (this.destroyed) return;
        this.destroyed = true;
        
        // Clear all timers
        for (var i = 0; i < this._timers.length; i++) {
            if (this._timers[i]) clearTimeout(this._timers[i]);
        }
        if (this.updateTimer) clearTimeout(this.updateTimer);
        
        // Remove scroll event
        if (this.scrollContent) {
            if (this.scrollContent.detachEvent) {
                this.scrollContent.detachEvent("onscroll", this._scrollHandler);
            } else {
                this.scrollContent.removeEventListener("scroll", this._scrollHandler);
            }
        }
        
        // Remove resize
        if (window.removeEventListener) {
            window.removeEventListener("resize", this._resizeHandler);
        } else if (window.detachEvent) {
            window.detachEvent("onresize", this._resizeHandler);
        }
        
        // Disconnect dir observer
        if (this._dirObserver) this._dirObserver.disconnect();
        if (this._dirInterval) clearInterval(this._dirInterval);
        
        // Clear DOM
        if (this.rowsA) this.rowsA.innerHTML = "";
        if (this.rowsB) this.rowsB.innerHTML = "";
		
		
		
		
		
		        // Remove click highlight event
        if (this.scrollContent && this._clickHighlightHandler) {
            if (this.scrollContent.detachEvent) {
                this.scrollContent.detachEvent("onclick", this._clickHighlightHandler);
            } else {
                this.scrollContent.removeEventListener("click", this._clickHighlightHandler, false);
            }
        }

        if (this._clickResetTimer) clearTimeout(this._clickResetTimer);
		
		
		
		
    };
    
    // ========== INITIALIZE ==========
    VScrollPro.prototype._init = function() {
	    this._initClickHighlight();   // ✅ ADD THIS
	    this._initSelectionBlock();   // 🔥 ADD THIS
        this._initDragScroller();
        this._initCustomScrollbar();
        this._initWheelScroll();
        this._initResize();
        this._initScrollEvent();
        this._positionByDir();
        this._watchDirChanges();
        this.refresh();
    };
    
    // ========== EXPORT ==========
    window.VScrollPro = VScrollPro;
    
})(window, document);
