#scrollBox {

  border:5px solid red;
  box-sizing:border-box;
  -moz-box-sizing:border-box;
  -webkit-box-sizing:border-box;
  zoom:1; /* IE6 layout trigger */

  /* --- Modern browsers --- */
  height:auto;
  width:auto;

  /* --- IE6 fallback dynamic height --- */
  _height:expression(this.parentNode.clientHeight + 'px');
  _width:expression(this.parentNode.clientWidth + 'px');
}

<script>




function toggleSticky() {
  var barRow     = document.getElementById('barRow');
  var scrollPane = document.getElementById('scrollPane');
  var bar        = document.getElementById('innerBottomBar');
  if (!barRow || !scrollPane || !bar) return;

  var isSticky = (barRow.getAttribute('data-sticky') === 'true');
  var borderBox = document.getElementById('borderBox');

  if (isSticky) {
    // ===== Unstick: move bar inside scrollable area =====
    barRow.setAttribute('data-sticky', 'false');
    document.getElementById('scrollInner').appendChild(bar);
    barRow.style.display = 'none';
  } else {
    // ===== Re-stick: move bar back to bottom row =====
    barRow.setAttribute('data-sticky', 'true');
    barRow.style.display = '';
    if (barRow.cells && barRow.cells[0]) {
      barRow.cells[0].appendChild(bar);
    }
  }

  // ===== Force IE6–7 to repaint borders =====
  if (borderBox) {
    borderBox.style.zoom = (borderBox.style.zoom === '1') ? '1.001' : '1';
    // extra safety for very old IE
    setTimeout(function() {
      borderBox.className = borderBox.className;
    }, 1);
  }
}
function onClickPrevNext(evt,page){
    alert("صفحة: " + page);
}








(function(){
  var cssReady = false, frameReady = false;

  // ======== Show viewport when CSS + iframe are ready ========
// ======== Show viewport when CSS + iframe are ready ========
function showViewport(){
  var vp = document.getElementById('viewport');
  var ov = document.getElementById('centerBox');

  // ✅ Reveal main viewport
  if(vp) vp.style.visibility = 'visible';

  // ✅ Just hide the overlay, don't remove
  if(ov) ov.style.display = 'none';
}
  // ======== Inject CSS into <head> ========
  function injectCss(cssText){
    if(!cssText) return;
    var style = document.createElement('style');
    style.type = 'text/css';
    if(style.styleSheet) style.styleSheet.cssText = cssText; // IE6–8
    else style.appendChild(document.createTextNode(cssText));
    document.getElementsByTagName('head')[0].appendChild(style);
    cssReady = true;
    showViewport();
  }

  // ======== Extract <pre> content from iframe ========
  function extractCssFromDoc(doc){
    if(!doc) return '';
    try{
      var pre = doc.getElementsByTagName('pre')[0];
      if(pre && (pre.textContent || pre.innerText))
        return pre.textContent || pre.innerText;
    }catch(e){}
    return '';
  }

  // ======== Manual background simulation for IE6–7 ========
  function applyResponsiveIE6(cssText){
    var box = document.getElementById('contentBox');
    if(!box) return;
    var w = document.body.clientWidth;
    var m1 = /max-width:\s*500px[^}]+background:\s*([^;]+);/i.exec(cssText);
    var m2 = /min-width:\s*501px[^}]+max-width:\s*900px[^}]+background:\s*([^;]+);/i.exec(cssText);
    var m3 = /min-width:\s*901px[^}]+background:\s*([^;]+);/i.exec(cssText);
    var color = '#f9f9f9';
    if(w < 500 && m1) color = m1[1];
    else if(w >= 501 && w <= 900 && m2) color = m2[1];
    else if(w >= 901 && m3) color = m3[1];
    box.style.backgroundColor = color;
  }

  // ======== Read CSS from iframe when ready ========
  function applyCssFromIframe(){
    var frame = document.getElementById('cssFrame');
    if(!frame) return;
    var css = '';
    try{
      var doc = frame.contentDocument || frame.contentWindow.document;
      css = extractCssFromDoc(doc);
    }catch(e){}
    if(css && css !== window._lastCSS){
      injectCss(css);
      window._lastCSS = css;
      if(document.all && !window.addEventListener)
        applyResponsiveIE6(css);
      // force IE redraw
      if(document.body && 'zoom' in document.body.style)
        document.body.style.zoom = (document.body.style.zoom == '1.001') ? '1' : '1.001';
    }
  }

  // ======== Receive postMessage from iframe (modern browsers) ========
  function onMessage(e){
    if(e.origin !== "null" && e.origin !== "*" && e.origin !== window.location.origin) return;
    var data = e.data || {};
    if(data.type === "CSS_FROM_IFRAME" && data.css){
      injectCss(data.css);
      window._lastCSS = data.css;
      if(document.all && !window.addEventListener)
        applyResponsiveIE6(data.css);
    }
  }

  // ======== Initialize loader ========
  function initCssLoader(){
    var frame = document.getElementById('cssFrame');
    if(!frame) return;

    // --- IE6–8 ---
    if(frame.attachEvent){
      frame.attachEvent('onreadystatechange', function(){
        if(frame.readyState == 'complete' || frame.readyState == 'interactive'){
          frameReady = true;
          applyCssFromIframe();
          showViewport();
        }
      });
    }

    // --- Modern browsers ---
    if(window.addEventListener){
      window.addEventListener('message', onMessage, false);
      frame.addEventListener('load', function(){
        frameReady = true;
        try { frame.contentWindow.postMessage({ type:"REQUEST_CSS" }, "*"); } catch(e){}
        showViewport();
      }, false);
    }

    // --- IE6–7 manual resize ---
    if(document.all && !window.addEventListener)
      window.attachEvent('onresize', function(){ applyResponsiveIE6(window._lastCSS || ''); });

    // --- Fallback for CHM/offline mode ---
    setTimeout(function(){ frameReady = true; applyCssFromIframe(); showViewport(); }, 800);
  }

  // ======== Modern + Mobile Responsive Background Update ========
  function updateResponsiveColor(){
    if(!window._lastCSS) return;
    var box = document.getElementById('contentBox');
    if(!box) return;
    var w = (window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth);
    var css = window._lastCSS;
    var m1 = /max-width:\s*500px[^}]+background:\s*([^;]+);/i.exec(css);
    var m2 = /min-width:\s*501px[^}]+max-width:\s*900px[^}]+background:\s*([^;]+);/i.exec(css);
    var m3 = /min-width:\s*901px[^}]+background:\s*([^;]+);/i.exec(css);
    var color = '#f9f9f9';
    if(w < 500 && m1) color = m1[1];
    else if(w >= 501 && w <= 900 && m2) color = m2[1];
    else if(w >= 901 && m3) color = m3[1];
    box.style.backgroundColor = color;
  }

  // --- Continuous polling for mobile browsers (no resize events) ---
  (function(){
    var _lastW = 0;
    setInterval(function(){
      var w = (window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth);
      if(Math.abs(w - _lastW) > 5){
        _lastW = w;
        updateResponsiveColor();
      }
    }, 400);
  })();

  // --- Bind resize + orientationchange for modern browsers ---
  if(window.addEventListener){
    window.addEventListener('resize', updateResponsiveColor, false);
    window.addEventListener('orientationchange', updateResponsiveColor, false);
  }

  // --- Init entry ---
  if(window.addEventListener)
    window.addEventListener('DOMContentLoaded', initCssLoader, false);
  else if(window.attachEvent)
    window.attachEvent('onload', initCssLoader);













})();
</script>

  <script type="text/javascript">
// Simple hover shim for old IE (and safe for modern browsers)
(function(){
  // helper: addClass/removeClass (IE6-safe)
  function addClass(el, cls){
    if(!el || !cls) return;
    var c = el.className || '';
    if((' '+c+' ').indexOf(' '+cls+' ') === -1) el.className = (c + ' ' + cls).replace(/^\s+|\s+$/g,'');
  }
  function removeClass(el, cls){
    if(!el || !cls) return;
    el.className = (el.className || '').replace(new RegExp('\\b'+cls+'\\b','g'),'').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');
  }

  // set up anchors in #pageList
  function initHoverShim(){
    var container = document.getElementById('pageList');
    if(!container) return;
    // get anchors (IE6: container.getElementsByTagName works)
    var links = container.getElementsByTagName('a'), i, a;
    for(i = 0; i < links.length; i++){
      a = links[i];
      // ensure hasLayout (IE6/7) so background repaints
      a.style.zoom = a.currentStyle ? (a.currentStyle.zoom || '1') : (a.style.zoom || '1');

      // add handlers if not already attached
     (function(el){
  if(el.attachEvent){
    el.attachEvent('onmouseover', function(){
      addClass(el, 'iehover');

      // repaint trick for IE6 borders (no jump)
      var parent = document.getElementById('borderBox');
      if(parent){
        parent.style.visibility = 'hidden';
        parent.style.visibility = 'visible';
      }
    });

    el.attachEvent('onmouseout', function(){
      removeClass(el, 'iehover');

      // repaint again to clear hover artifacts
      var parent = document.getElementById('borderBox');
      if(parent){
        parent.style.visibility = 'hidden';
        parent.style.visibility = 'visible';
      }
    });
  } else {
    // modern browsers
    el.addEventListener('mouseover', function(){ addClass(el, 'iehover'); }, false);
    el.addEventListener('mouseout',  function(){ removeClass(el, 'iehover'); }, false);
  }
})(a);

    }
  }

  // init on DOM ready / load
  if(window.attachEvent){
    window.attachEvent('onload', initHoverShim);
  } else {
    window.addEventListener('DOMContentLoaded', initHoverShim, false);
    // fallback
    window.addEventListener('load', initHoverShim, false);
  }
})();
</script>
